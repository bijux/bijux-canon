[tox]
minversion = 4.11
requires =
    tox>=4.11
skip_missing_interpreters = true
envlist =
    security
    test-{dev,runtime,agent,ingest,reason,index}
    lint-{dev,runtime,agent,ingest,reason,index}
    quality-{dev,runtime,agent,ingest,reason,index}
    security-{dev,runtime,agent,ingest,reason,index}
    docs-{runtime,agent,ingest,reason,index}
    api-{runtime,agent,ingest,reason,index}
    build-{dev,runtime,agent,ingest,reason,index}
    sbom-{dev,runtime,agent,ingest,reason,index}

[testenv]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {env:PACKAGE_DIR}
setenv =
    MONOREPO_ROOT = {tox_root}
    MAKEFLAGS = VENV={envdir} ACT={envdir}/bin
    PIP_DISABLE_PIP_VERSION_CHECK = 1
    PYTHONDONTWRITEBYTECODE = 1
    INSTALL_EXTRAS = dev
    docs-index: INSTALL_EXTRAS = docs,dev
    docs-ingest: INSTALL_EXTRAS = docs,dev
    api-runtime: INSTALL_EXTRAS = api,dev
    api-index: INSTALL_EXTRAS = api,dev
    api-reason: INSTALL_EXTRAS = api,dev
    dev: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-dev.mk
    runtime: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-runtime.mk
    agent: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-agent.mk
    ingest: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-ingest.mk
    reason: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-reason.mk
    index: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-index.mk
    dev: PACKAGE_DIR = {tox_root}/packages/bijux-canon-dev
    runtime: PACKAGE_DIR = {tox_root}/packages/bijux-canon-runtime
    agent: PACKAGE_DIR = {tox_root}/packages/bijux-canon-agent
    ingest: PACKAGE_DIR = {tox_root}/packages/bijux-canon-ingest
    reason: PACKAGE_DIR = {tox_root}/packages/bijux-canon-reason
    index: PACKAGE_DIR = {tox_root}/packages/bijux-canon-index
    dev: API_DIR = {tox_root}/apis/bijux-canon-dev
    runtime: API_DIR = {tox_root}/apis/bijux-canon-runtime
    agent: API_DIR = {tox_root}/apis/bijux-canon-agent
    ingest: API_DIR = {tox_root}/apis/bijux-canon-ingest
    reason: API_DIR = {tox_root}/apis/bijux-canon-reason
    index: API_DIR = {tox_root}/apis/bijux-canon-index
passenv =
    CI
    GITHUB_*
    GITLAB_*
    PIP_INDEX_URL
    PIP_EXTRA_INDEX_URL
    HTTP_PROXY
    HTTPS_PROXY
    NO_PROXY
    SSH_AUTH_SOCK
    LC_ALL
    LANG
    TC_BASE
    SBOM_CLI
    OPENAPI_GENERATOR_VERSION
    API_HOST
    API_PORT
    API_BASE_PATH
    API_FACTORY
commands_pre =
    python -m pip install -U "pip>=25.3"
    make -f {env:PACKAGE_MAKEFILE} install EXTRAS={env:INSTALL_EXTRAS} PACKAGE_INSTALL_SPEC=.[{env:INSTALL_EXTRAS}]
    security: python -m pip install -U "pip>=25.3"
commands =
    test: make -f {env:PACKAGE_MAKEFILE} test
    lint: make -f {env:PACKAGE_MAKEFILE} lint
    quality: make -f {env:PACKAGE_MAKEFILE} quality
    security: make -f {env:PACKAGE_MAKEFILE} security
    docs: make -f {env:PACKAGE_MAKEFILE} docs
    api: make -f {env:PACKAGE_MAKEFILE} api
    build: make -f {env:PACKAGE_MAKEFILE} build
    sbom: make -f {env:PACKAGE_MAKEFILE} sbom

[testenv:security]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands_pre =
    python -m pip install -U "pip>=25.3"
commands =
    make security
