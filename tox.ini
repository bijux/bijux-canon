[tox]
minversion = 4.11
requires =
    tox>=4.11
    tox-gh-actions>=3.1
isolated_build = true
skip_missing_interpreters = true
envlist =
    security
    test-{dev,runtime,agent,ingest,reason,index,compatcanon,compatflows,compatagent,compatrag,compatrar,compatvex}
    lint-{dev,runtime,agent,ingest,reason,index,compatcanon,compatflows,compatagent,compatrag,compatrar,compatvex}
    quality-{dev,runtime,agent,ingest,reason,index,compatcanon,compatflows,compatagent,compatrag,compatrar,compatvex}
    security-{dev,runtime,agent,ingest,reason,index,compatcanon,compatflows,compatagent,compatrag,compatrar,compatvex}
    docs-{runtime,agent,ingest,reason,index}
    api-{runtime,agent,ingest,reason,index}
    build-{dev,runtime,agent,ingest,reason,index}
    sbom-{dev,runtime,agent,ingest,reason,index}
    docs

[gh-actions]
python =
    3.11: security, docs, test-dev, test-runtime, test-agent, test-ingest, test-reason, test-index, test-compatcanon, test-compatflows, test-compatagent, test-compatrag, test-compatrar, test-compatvex, lint-dev, lint-runtime, lint-agent, lint-ingest, lint-reason, lint-index, lint-compatcanon, lint-compatflows, lint-compatagent, lint-compatrag, lint-compatrar, lint-compatvex, quality-dev, quality-runtime, quality-agent, quality-ingest, quality-reason, quality-index, quality-compatcanon, quality-compatflows, quality-compatagent, quality-compatrag, quality-compatrar, quality-compatvex, security-dev, security-runtime, security-agent, security-ingest, security-reason, security-index, security-compatcanon, security-compatflows, security-compatagent, security-compatrag, security-compatrar, security-compatvex, docs-runtime, docs-agent, docs-ingest, docs-reason, docs-index, api-runtime, api-agent, api-ingest, api-reason, api-index, build-dev, build-runtime, build-agent, build-ingest, build-reason, build-index, sbom-dev, sbom-runtime, sbom-agent, sbom-ingest, sbom-reason, sbom-index

[testenv]
package = skip
basepython = python3.11
skip_install = true
allowlist_externals = make
change_dir = {env:PACKAGE_DIR}
setenv =
    MONOREPO_ROOT = {tox_root}
    MAKEFLAGS = VENV={envdir} ACT={envdir}/bin
    PIP_DISABLE_PIP_VERSION_CHECK = 1
    PYTHONDONTWRITEBYTECODE = 1
    INSTALL_EXTRAS = dev
    docs-index: INSTALL_EXTRAS = docs,dev
    docs-ingest: INSTALL_EXTRAS = docs,dev
    api-runtime: INSTALL_EXTRAS = api,dev
    api-index: INSTALL_EXTRAS = api,dev
    api-reason: INSTALL_EXTRAS = api,dev
    dev: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-dev.mk
    runtime: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-runtime.mk
    agent: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-agent.mk
    ingest: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-ingest.mk
    reason: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-reason.mk
    index: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-canon-index.mk
    compatcanon: PACKAGE_MAKEFILE = {tox_root}/makes/packages/compat-package.mk
    compatflows: PACKAGE_MAKEFILE = {tox_root}/makes/packages/compat-package.mk
    compatagent: PACKAGE_MAKEFILE = {tox_root}/makes/packages/compat-package.mk
    compatrag: PACKAGE_MAKEFILE = {tox_root}/makes/packages/compat-package.mk
    compatrar: PACKAGE_MAKEFILE = {tox_root}/makes/packages/compat-package.mk
    compatvex: PACKAGE_MAKEFILE = {tox_root}/makes/packages/compat-package.mk
    dev: PACKAGE_DIR = {tox_root}/packages/bijux-canon-dev
    runtime: PACKAGE_DIR = {tox_root}/packages/bijux-canon-runtime
    agent: PACKAGE_DIR = {tox_root}/packages/bijux-canon-agent
    ingest: PACKAGE_DIR = {tox_root}/packages/bijux-canon-ingest
    reason: PACKAGE_DIR = {tox_root}/packages/bijux-canon-reason
    index: PACKAGE_DIR = {tox_root}/packages/bijux-canon-index
    compatcanon: PACKAGE_DIR = {tox_root}/packages/compat-bijux-canon
    compatflows: PACKAGE_DIR = {tox_root}/packages/compat-agentic-flows
    compatagent: PACKAGE_DIR = {tox_root}/packages/compat-bijux-agent
    compatrag: PACKAGE_DIR = {tox_root}/packages/compat-bijux-rag
    compatrar: PACKAGE_DIR = {tox_root}/packages/compat-bijux-rar
    compatvex: PACKAGE_DIR = {tox_root}/packages/compat-bijux-vex
    dev: API_DIR = {tox_root}/apis/bijux-canon-dev
    runtime: API_DIR = {tox_root}/apis/bijux-canon-runtime
    agent: API_DIR = {tox_root}/apis/bijux-canon-agent
    ingest: API_DIR = {tox_root}/apis/bijux-canon-ingest
    reason: API_DIR = {tox_root}/apis/bijux-canon-reason
    index: API_DIR = {tox_root}/apis/bijux-canon-index
passenv =
    CI
    GITHUB_*
    GITLAB_*
    PIP_INDEX_URL
    PIP_EXTRA_INDEX_URL
    HTTP_PROXY
    HTTPS_PROXY
    NO_PROXY
    SSH_AUTH_SOCK
    LC_ALL
    LANG
    TC_BASE
    SBOM_CLI
    OPENAPI_GENERATOR_VERSION
    API_HOST
    API_PORT
    API_BASE_PATH
    API_FACTORY
commands_pre =
    python -m pip install -U "pip>=25.3,<26"
    make -f {env:PACKAGE_MAKEFILE} install EXTRAS={env:INSTALL_EXTRAS} PACKAGE_INSTALL_SPEC=.[{env:INSTALL_EXTRAS}]
    security: python -m pip install -U "pip>=25.3,<26"
commands =
    test: make -f {env:PACKAGE_MAKEFILE} test-ci
    lint: make -f {env:PACKAGE_MAKEFILE} lint
    quality: make -f {env:PACKAGE_MAKEFILE} quality
    security: make -f {env:PACKAGE_MAKEFILE} security
    docs: make -f {env:PACKAGE_MAKEFILE} docs
    api: make -f {env:PACKAGE_MAKEFILE} api
    build: make -f {env:PACKAGE_MAKEFILE} build
    sbom: make -f {env:PACKAGE_MAKEFILE} sbom

[testenv:security]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands_pre =
    python -m pip install -U "pip>=25.3,<26"
commands =
    make security

[testenv:docs]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands_pre =
    python -m pip install -U "pip>=25.3,<26"
commands =
    make docs
