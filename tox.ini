[tox]
minversion = 4.11
requires =
    tox>=4.11
skip_missing_interpreters = true
envlist =
    test-{agentic_flows,bijux_agent,bijux_rag,bijux_rar,bijux_vex}
    lint-{agentic_flows,bijux_agent,bijux_rag,bijux_rar,bijux_vex}
    quality-{agentic_flows,bijux_agent,bijux_rag,bijux_rar,bijux_vex}
    security-{agentic_flows,bijux_agent,bijux_rag,bijux_rar,bijux_vex}
    docs-{agentic_flows,bijux_agent,bijux_rag,bijux_rar,bijux_vex}
    api-{agentic_flows,bijux_agent,bijux_rag,bijux_rar,bijux_vex}
    build-{agentic_flows,bijux_agent,bijux_rag,bijux_rar,bijux_vex}
    sbom-{agentic_flows,bijux_agent,bijux_rag,bijux_rar,bijux_vex}

[testenv]
package = skip
allowlist_externals = make
change_dir = {env:PACKAGE_DIR}
setenv =
    MAKEFLAGS = VENV={envdir} ACT={envdir}/bin
    PIP_DISABLE_PIP_VERSION_CHECK = 1
    PYTHONDONTWRITEBYTECODE = 1
    agentic_flows: PACKAGE_DIR = {tox_root}/packages/bijux-canon-runtime
    bijux_agent: PACKAGE_DIR = {tox_root}/packages/bijux-canon-agent
    bijux_rag: PACKAGE_DIR = {tox_root}/packages/bijux-canon-ingest
    bijux_rar: PACKAGE_DIR = {tox_root}/packages/bijux-canon-reason
    bijux_vex: PACKAGE_DIR = {tox_root}/packages/bijux-canon-index
passenv =
    CI
    GITHUB_*
    GITLAB_*
    PIP_INDEX_URL
    PIP_EXTRA_INDEX_URL
    HTTP_PROXY
    HTTPS_PROXY
    NO_PROXY
    SSH_AUTH_SOCK
    LC_ALL
    LANG
    TC_BASE
    SBOM_CLI
    OPENAPI_GENERATOR_VERSION
    API_HOST
    API_PORT
    API_BASE_PATH
    API_FACTORY
commands_pre =
    security: python -m pip install -U "pip>=25.3"
commands =
    test: make test
    lint: make lint
    quality: make quality
    security: make security
    docs: make docs
    api: make api
    build: make build
    sbom: make sbom
