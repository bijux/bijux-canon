name: publish-bijux-vex

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    uses: ./.github/workflows/build-release-artifacts.yml
    with:
      package_slug: bijux-vex
      package_dir: packages/compat-bijux-vex
      artifacts_dir: artifacts/compat-bijux-vex
      cache_dependency_path: |
        packages/compat-bijux-vex/pyproject.toml
        pyproject.toml
      build_targets: build

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download publish artifacts
        uses: actions/download-artifact@v5
        with:
          name: bijux-vex-pypi-dist
          path: .github/tmp/bijux-vex-dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: .github/tmp/bijux-vex-dist
          skip-existing: true
