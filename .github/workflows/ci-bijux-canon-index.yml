name: ci-bijux-canon-index

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-bijux-canon-index.yml"
      - ".github/workflows/ci-package.yml"
      - "packages/bijux-canon-index/**"
      - "apis/bijux-canon-index/**"
      - "configs/**"
      - "makes/**"
      - "Makefile"
      - "pyproject.toml"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  pull_request:
    paths:
      - ".github/workflows/ci-bijux-canon-index.yml"
      - ".github/workflows/ci-package.yml"
      - "packages/bijux-canon-index/**"
      - "apis/bijux-canon-index/**"
      - "configs/**"
      - "makes/**"
      - "Makefile"
      - "pyproject.toml"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci-package.yml
    with:
      package_slug: bijux-canon-index
      package_dir: packages/bijux-canon-index
      artifacts_dir: artifacts/bijux-canon-index
      cache_dependency_path: |
        packages/bijux-canon-index/pyproject.toml
        pyproject.toml
        tox.ini
      check_targets: '["quality", "security", "docs", "api", "build", "sbom"]'
