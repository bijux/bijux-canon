name: publish-bijux-canon-runtime

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    uses: ./.github/workflows/publish-package.yml
    with:
      package_slug: bijux-canon-runtime
      package_dir: packages/bijux-canon-runtime
      artifacts_dir: artifacts/bijux-canon-runtime
      cache_dependency_path: |
        packages/bijux-canon-runtime/pyproject.toml
        pyproject.toml
      build_targets: "build sbom"
      upload_paths: |
        artifacts/bijux-canon-runtime/build/*
        artifacts/bijux-canon-runtime/sbom/*
