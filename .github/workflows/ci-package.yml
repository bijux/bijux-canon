name: ci-package

on:
  workflow_call:
    inputs:
      package_slug:
        required: true
        type: string
      package_dir:
        required: true
        type: string
      artifacts_dir:
        required: true
        type: string
      cache_dependency_path:
        required: true
        type: string
      test_python_versions:
        required: false
        type: string
        default: '["3.11"]'
      check_targets:
        required: false
        type: string
        default: '["quality", "security", "docs", "api", "build", "sbom"]'
      api_toolchain_targets:
        required: false
        type: string
        default: '["api"]'
      post_test_command:
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: ci-${{ inputs.package_slug }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACTS_DIR: ${{ inputs.artifacts_dir }}
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.test_python_versions) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Run tests
        run: make -C ${{ inputs.package_dir }} test

      - name: Run post-test validation
        if: ${{ inputs.post_test_command != '' }}
        shell: bash
        run: ${{ inputs.post_test_command }}

      - name: Upload test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_slug }}-test-py${{ matrix.python-version }}
          path: ${{ env.ARTIFACTS_DIR }}/test
          if-no-files-found: ignore
          retention-days: 14

  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(inputs.check_targets) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - uses: actions/setup-node@v4
        if: ${{ contains(fromJson(inputs.api_toolchain_targets), matrix.target) }}
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        if: ${{ contains(fromJson(inputs.api_toolchain_targets), matrix.target) }}
        with:
          distribution: temurin
          java-version: "17"

      - name: Run ${{ matrix.target }}
        run: make -C ${{ inputs.package_dir }} ${{ matrix.target }}

      - name: Upload artifacts
        if: ${{ always() && hashFiles(format('{0}/{1}/**', env.ARTIFACTS_DIR, matrix.target)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_slug }}-${{ matrix.target }}
          path: ${{ env.ARTIFACTS_DIR }}/${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    needs: [tests, checks]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Run lint
        run: make -C ${{ inputs.package_dir }} lint

      - name: Upload lint artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_slug }}-lint
          path: ${{ env.ARTIFACTS_DIR }}/lint
          if-no-files-found: ignore
          retention-days: 14
