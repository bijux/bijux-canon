name: publish-agentic-flows

on:
  push:
    tags:
      - "bijux-canon-runtime/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/publish-package.yml
    with:
      package_slug: agentic-flows
      package_dir: packages/compat-agentic-flows
      artifacts_dir: artifacts/compat-agentic-flows
      cache_dependency_path: |
        packages/compat-agentic-flows/pyproject.toml
        pyproject.toml
      build_targets: build
