name: publish-agentic-flows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build-release-artifacts.yml
    with:
      package_slug: agentic-flows
      package_dir: packages/compat-agentic-flows
      artifacts_dir: artifacts/compat-agentic-flows
      cache_dependency_path: uv.lock
      build_targets: build

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
    steps:
      - name: Download publish artifacts
        uses: actions/download-artifact@v5
        with:
          name: agentic-flows-pypi-dist
          path: .github/tmp/agentic-flows-dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: .github/tmp/agentic-flows-dist
          skip-existing: true
