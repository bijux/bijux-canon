name: docs-bijux-canon-index

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs-bijux-canon-index.yml"
      - "packages/bijux-canon-index/docs/**"
      - "packages/bijux-canon-index/CHANGELOG.md"
      - "apis/bijux-canon-index/**"
      - "scripts/bijux-canon-index/**"
      - "packages/bijux-canon-index/mkdocs.yml"
      - "makes/docs.mk"
      - "makes/shared/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-bijux-canon-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/bijux-canon-index/pyproject.toml

      - name: Install package docs toolchain
        run: make -C packages/bijux-canon-index install

      - name: Configure Git author
        run: |
          git config user.name "Bijan Mousavi"
          git config user.email "bijan@bijux.io"

      - name: Deploy docs
        run: make -C packages/bijux-canon-index docs-deploy
