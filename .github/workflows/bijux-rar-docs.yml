name: bijux-rar Docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bijux-rar-docs.yml"
      - "packages/bijux-rar/docs/**"
      - "packages/bijux-rar/README.md"
      - "packages/bijux-rar/CHANGELOG.md"
      - "apis/bijux-rar/**"
      - "scripts/bijux-rar/**"
      - "configs/bijux-rar/mkdocs.yml"
      - "makes/bijux-rar/docs.mk"
      - "makes/shared/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bijux-rar-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/bijux-rar/pyproject.toml

      - name: Install package docs toolchain
        run: make -C packages/bijux-rar install

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs
        run: make -C packages/bijux-rar docs-deploy
