name: bijux-llm-rag Docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bijux-llm-rag-docs.yml"
      - "packages/bijux-llm-rag/docs/**"
      - "packages/bijux-llm-rag/CHANGELOG.md"
      - "apis/bijux-llm-rag/**"
      - "scripts/bijux-rag/**"
      - "packages/bijux-llm-rag/mkdocs.yml"
      - "makes/docs.mk"
      - "makes/shared/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bijux-llm-rag-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/bijux-llm-rag/pyproject.toml

      - name: Install package docs toolchain
        run: make -C packages/bijux-llm-rag install

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs
        run: make -C packages/bijux-llm-rag docs-deploy
