name: publish-bijux-canon-reason

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    uses: ./.github/workflows/publish-package.yml
    with:
      package_slug: bijux-canon-reason
      package_dir: packages/bijux-canon-reason
      artifacts_dir: artifacts/bijux-canon-reason
      cache_dependency_path: |
        packages/bijux-canon-reason/pyproject.toml
        pyproject.toml
      build_targets: "build sbom"
      upload_paths: |
        artifacts/bijux-canon-reason/build/*
        artifacts/bijux-canon-reason/sbom/*
