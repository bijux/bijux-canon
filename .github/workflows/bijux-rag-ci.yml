name: bijux-rag CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bijux-rag-ci.yml"
      - "packages/bijux-rag/**"
      - "configs/bijux-rag/**"
      - "makes/bijux-rag/**"
      - "makes/shared/**"
      - "Makefile"
      - "tox.ini"
      - "scripts/deptry_scan.py"
  pull_request:
    paths:
      - ".github/workflows/bijux-rag-ci.yml"
      - "packages/bijux-rag/**"
      - "configs/bijux-rag/**"
      - "makes/bijux-rag/**"
      - "makes/shared/**"
      - "Makefile"
      - "tox.ini"
      - "scripts/deptry_scan.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bijux-rag-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            packages/bijux-rag/pyproject.toml
            tox.ini

      - name: Run tests
        run: make -C packages/bijux-rag test

      - name: Upload test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-rag-test-py${{ matrix.python-version }}
          path: packages/bijux-rag/artifacts/test
          if-no-files-found: ignore
          retention-days: 14

  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [quality, security, docs, build, api, sbom, hygiene]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/bijux-rag/pyproject.toml
            tox.ini

      - uses: actions/setup-node@v4
        if: ${{ matrix.target == 'api' }}
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        if: ${{ matrix.target == 'api' }}
        with:
          distribution: temurin
          java-version: "17"

      - name: Run ${{ matrix.target }}
        run: make -C packages/bijux-rag ${{ matrix.target }}

      - name: Upload artifacts
        if: ${{ always() && hashFiles(format('packages/bijux-rag/artifacts/{0}/**', matrix.target)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-rag-${{ matrix.target }}
          path: packages/bijux-rag/artifacts/${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    needs: [tests, checks]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/bijux-rag/pyproject.toml
            tox.ini

      - name: Run lint
        run: make -C packages/bijux-rag lint

      - name: Upload lint artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-rag-lint
          path: packages/bijux-rag/artifacts/lint
          if-no-files-found: ignore
          retention-days: 14
