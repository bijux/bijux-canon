name: deploy-docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
      - "mkdocs.yml"
      - "mkdocs.shared.yml"
      - "makes/**"
      - "Makefile"
      - "packages/bijux-canon-dev/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCS_SITE_URL: https://bijux.io/bijux-canon/
  DOCS_SITE_DIR: artifacts/root/docs/build-site

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build documentation site
        run: |
          make docs DOCS_BUILD_SITE_URL="${DOCS_SITE_URL}"

      - name: Validate published site assets
        shell: bash
        run: |
          set -euo pipefail
          test -f "${DOCS_SITE_DIR}/index.html"
          test -f "${DOCS_SITE_DIR}/assets/site-icons/favicon.ico"
          test -f "${DOCS_SITE_DIR}/assets/site-icons/apple-touch-icon.png"
          test -f "${DOCS_SITE_DIR}/assets/site-icons/apple-touch-icon-precomposed.png"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.DOCS_SITE_DIR }}

  deploy:
    name: Deploy docs site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
