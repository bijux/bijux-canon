name: publish-bijux-rar

on:
  push:
    tags:
      - "bijux-canon-reason/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/publish-package.yml
    with:
      package_slug: bijux-rar
      package_dir: packages/compat-bijux-rar
      artifacts_dir: artifacts/compat-bijux-rar
      cache_dependency_path: |
        packages/compat-bijux-rar/pyproject.toml
        pyproject.toml
      build_command: make PACKAGE=compat-bijux-rar build
