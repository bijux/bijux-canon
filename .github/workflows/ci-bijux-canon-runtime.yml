name: ci-bijux-canon-runtime

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".github/workflows/ci-bijux-canon-runtime.yml"
      - ".github/workflows/ci-package.yml"
      - "packages/bijux-canon-runtime/**"
      - "packages/compat-agentic-flows/**"
      - "apis/bijux-canon-runtime/**"
      - "configs/**"
      - "makes/**"
      - "Makefile"
      - "pyproject.toml"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  pull_request:
    paths:
      - ".github/workflows/ci-bijux-canon-runtime.yml"
      - ".github/workflows/ci-package.yml"
      - "packages/bijux-canon-runtime/**"
      - "packages/compat-agentic-flows/**"
      - "apis/bijux-canon-runtime/**"
      - "configs/**"
      - "makes/**"
      - "Makefile"
      - "pyproject.toml"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci-package.yml
    with:
      package_slug: bijux-canon-runtime
      package_dir: packages/bijux-canon-runtime
      artifacts_dir: artifacts/bijux-canon-runtime
      cache_dependency_path: uv.lock
      check_targets: '["quality", "security", "docs", "build", "sbom", "api", "openapi-drift"]'
      api_toolchain_targets: '["api", "openapi-drift"]'
      post_test_command: |
        set -euo pipefail
        venv_python="${ARTIFACTS_DIR}/venv/bin/python"
        if compgen -G "packages/bijux-canon-runtime/src/bijux_canon_runtime/providers/*" > /dev/null; then
          "${venv_python}" -m coverage report \
            --rcfile configs/coveragerc.ini \
            --data-file "${ARTIFACTS_DIR}/test/.coverage" \
            --include "packages/bijux-canon-runtime/src/bijux_canon_runtime/providers/*" \
            --fail-under=65
        fi
        if [ -f "packages/bijux-canon-runtime/src/bijux_canon_runtime/interfaces/cli.py" ]; then
          "${venv_python}" -m coverage report \
            --rcfile configs/coveragerc.ini \
            --data-file "${ARTIFACTS_DIR}/test/.coverage" \
            --include "packages/bijux-canon-runtime/src/bijux_canon_runtime/interfaces/cli.py" \
            --fail-under=60
        fi
        if compgen -G "packages/bijux-canon-runtime/src/bijux_canon_runtime/api/*" > /dev/null; then
          "${venv_python}" -m coverage report \
            --rcfile configs/coveragerc.ini \
            --data-file "${ARTIFACTS_DIR}/test/.coverage" \
            --include "packages/bijux-canon-runtime/src/bijux_canon_runtime/api/*" \
            --fail-under=75
        fi
