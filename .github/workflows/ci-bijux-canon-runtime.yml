name: ci-bijux-canon-runtime

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".github/workflows/ci-bijux-canon-runtime.yml"
      - "packages/bijux-canon-runtime/**"
      - "packages/compat-agentic-flows/**"
      - "apis/bijux-canon-runtime/**"
      - "makes/lint.mk"
      - "makes/test.mk"
      - "makes/api.mk"
      - "makes/build.mk"
      - "makes/quality.mk"
      - "makes/security.mk"
      - "makes/sbom.mk"
      - "makes/publish.mk"
      - "makes/shared/**"
      - "Makefile"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  pull_request:
    paths:
      - ".github/workflows/ci-bijux-canon-runtime.yml"
      - "packages/bijux-canon-runtime/**"
      - "packages/compat-agentic-flows/**"
      - "apis/bijux-canon-runtime/**"
      - "makes/lint.mk"
      - "makes/test.mk"
      - "makes/api.mk"
      - "makes/build.mk"
      - "makes/quality.mk"
      - "makes/security.mk"
      - "makes/sbom.mk"
      - "makes/publish.mk"
      - "makes/shared/**"
      - "Makefile"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-bijux-canon-runtime-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACTS_DIR: artifacts/bijux-canon-runtime
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/bijux-canon-runtime/pyproject.toml
            tox.ini

      - name: Run tests
        run: make -C packages/bijux-canon-runtime test

      - name: Enforce coverage floors
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G "packages/bijux-canon-runtime/src/agentic_flows/providers/*" > /dev/null; then
            python -m coverage report \
              --rcfile configs/coveragerc.ini \
              --data-file "${ARTIFACTS_DIR}/test/.coverage" \
              --include "packages/bijux-canon-runtime/src/agentic_flows/providers/*" \
              --fail-under=65
          fi
          if [ -f "packages/bijux-canon-runtime/src/agentic_flows/interfaces/cli.py" ]; then
            python -m coverage report \
              --rcfile configs/coveragerc.ini \
              --data-file "${ARTIFACTS_DIR}/test/.coverage" \
              --include "packages/bijux-canon-runtime/src/agentic_flows/interfaces/cli.py" \
              --fail-under=60
          fi
          if compgen -G "packages/bijux-canon-runtime/src/agentic_flows/api/*" > /dev/null; then
            python -m coverage report \
              --rcfile configs/coveragerc.ini \
              --data-file "${ARTIFACTS_DIR}/test/.coverage" \
              --include "packages/bijux-canon-runtime/src/agentic_flows/api/*" \
              --fail-under=75
          fi

      - name: Upload test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-canon-runtime-test
          path: ${{ env.ARTIFACTS_DIR }}/test
          if-no-files-found: ignore
          retention-days: 14

  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - quality
          - security
          - docs
          - build
          - sbom
          - api
          - openapi-drift

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/bijux-canon-runtime/pyproject.toml
            tox.ini

      - uses: actions/setup-node@v4
        if: ${{ matrix.target == 'api' }}
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        if: ${{ matrix.target == 'api' }}
        with:
          distribution: temurin
          java-version: "17"

      - name: Run ${{ matrix.target }}
        run: make -C packages/bijux-canon-runtime ${{ matrix.target }}

      - name: Upload artifacts
        if: ${{ always() && hashFiles(format('{0}/{1}/**', env.ARTIFACTS_DIR, matrix.target)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-canon-runtime-${{ matrix.target }}
          path: ${{ env.ARTIFACTS_DIR }}/${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    needs: [tests, checks]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/bijux-canon-runtime/pyproject.toml
            tox.ini

      - name: Run lint
        run: make -C packages/bijux-canon-runtime lint

      - name: Upload lint artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-canon-runtime-lint
          path: ${{ env.ARTIFACTS_DIR }}/lint
          if-no-files-found: ignore
          retention-days: 14
