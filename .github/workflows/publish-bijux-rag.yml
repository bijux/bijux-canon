name: publish-bijux-rag

on:
  push:
    tags:
      - "bijux-canon-ingest/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/publish-package.yml
    with:
      package_slug: bijux-rag
      package_dir: packages/compat-bijux-rag
      artifacts_dir: artifacts/compat-bijux-rag
      cache_dependency_path: |
        packages/compat-bijux-rag/pyproject.toml
        pyproject.toml
      build_targets: build
