name: bijux-rar Publish

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bijux-rar-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/bijux-rar/pyproject.toml

      - name: Build distribution and SBOM
        run: |
          make -C packages/bijux-rar build
          make -C packages/bijux-rar sbom

      - name: Stage publish artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/tmp/bijux-rar-dist
          cp packages/bijux-rar/artifacts/build/*.whl .github/tmp/bijux-rar-dist/
          cp packages/bijux-rar/artifacts/build/*.tar.gz .github/tmp/bijux-rar-dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: .github/tmp/bijux-rar-dist
          skip-existing: true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bijux-rar-release
          path: |
            packages/bijux-rar/artifacts/build/*
            packages/bijux-rar/artifacts/sbom/*
          if-no-files-found: ignore
          retention-days: 14
