name: publish-bijux-canon-agent

on:
  push:
    tags:
      - "bijux-canon-agent/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/publish-package.yml
    with:
      package_slug: bijux-canon-agent
      package_dir: packages/bijux-canon-agent
      artifacts_dir: artifacts/bijux-canon-agent
      cache_dependency_path: |
        packages/bijux-canon-agent/pyproject.toml
        pyproject.toml
      build_command: |
        make -C packages/bijux-canon-agent build
        make -C packages/bijux-canon-agent sbom
      upload_paths: |
        artifacts/bijux-canon-agent/build/*
        artifacts/bijux-canon-agent/sbom/*
