name: publish-bijux-canon-agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build-release-artifacts.yml
    with:
      package_slug: bijux-canon-agent
      package_dir: packages/bijux-canon-agent
      artifacts_dir: artifacts/bijux-canon-agent
      cache_dependency_path: |
        packages/bijux-canon-agent/pyproject.toml
        pyproject.toml
      build_targets: "build sbom"
      upload_paths: |
        artifacts/bijux-canon-agent/build/*
        artifacts/bijux-canon-agent/sbom/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
    steps:
      - name: Download publish artifacts
        uses: actions/download-artifact@v5
        with:
          name: bijux-canon-agent-pypi-dist
          path: .github/tmp/bijux-canon-agent-dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: .github/tmp/bijux-canon-agent-dist
          skip-existing: true
