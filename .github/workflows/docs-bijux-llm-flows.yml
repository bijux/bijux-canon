name: docs-bijux-llm-flows

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs-bijux-llm-flows.yml"
      - "packages/bijux-llm-flows/docs/**"
      - "packages/bijux-llm-flows/CHANGELOG.md"
      - "apis/bijux-llm-flows/**"
      - "scripts/bijux-llm-flows/**"
      - "packages/bijux-llm-flows/mkdocs.yml"
      - "makes/docs.mk"
      - "makes/shared/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-bijux-llm-flows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/bijux-llm-flows/pyproject.toml

      - name: Install package docs toolchain
        run: make -C packages/bijux-llm-flows install

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs
        run: make -C packages/bijux-llm-flows docs-deploy
