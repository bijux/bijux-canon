name: bijux-llm-vex Publish

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bijux-llm-vex-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ARTIFACTS_DIR: artifacts/bijux-vex

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/bijux-vex/pyproject.toml

      - name: Build release artifacts
        run: make -C packages/bijux-vex build

      - name: Stage publish artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/tmp/bijux-llm-vex-dist
          cp "${ARTIFACTS_DIR}"/release/*.whl .github/tmp/bijux-llm-vex-dist/
          cp "${ARTIFACTS_DIR}"/release/*.tar.gz .github/tmp/bijux-llm-vex-dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: .github/tmp/bijux-llm-vex-dist
          skip-existing: true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bijux-llm-vex-release
          path: ${{ env.ARTIFACTS_DIR }}/release/*
          if-no-files-found: ignore
          retention-days: 14
