name: publish-bijux-agent

on:
  push:
    tags:
      - "bijux-canon-agent/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/publish-package.yml
    with:
      package_slug: bijux-agent
      package_dir: packages/compat-bijux-agent
      artifacts_dir: artifacts/compat-bijux-agent
      cache_dependency_path: |
        packages/compat-bijux-agent/pyproject.toml
        pyproject.toml
      build_targets: build
