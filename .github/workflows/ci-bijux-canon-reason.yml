name: ci-bijux-canon-reason

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-bijux-canon-reason.yml"
      - ".github/workflows/ci-package.yml"
      - "packages/bijux-canon-reason/**"
      - "apis/bijux-canon-reason/**"
      - "configs/**"
      - "makes/**"
      - "Makefile"
      - "pyproject.toml"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  pull_request:
    paths:
      - ".github/workflows/ci-bijux-canon-reason.yml"
      - ".github/workflows/ci-package.yml"
      - "packages/bijux-canon-reason/**"
      - "apis/bijux-canon-reason/**"
      - "configs/**"
      - "makes/**"
      - "Makefile"
      - "pyproject.toml"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci-package.yml
    with:
      package_slug: bijux-canon-reason
      package_dir: packages/bijux-canon-reason
      artifacts_dir: artifacts/bijux-canon-reason
      cache_dependency_path: |
        packages/bijux-canon-reason/pyproject.toml
        pyproject.toml
        tox.ini
