name: bijux-rar CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bijux-rar-ci.yml"
      - "packages/bijux-rar/**"
      - "apis/bijux-rar/**"
      - "configs/bijux-rar/**"
      - "makes/bijux-rar/**"
      - "makes/lint.mk"
      - "makes/test.mk"
      - "makes/quality.mk"
      - "makes/security.mk"
      - "makes/sbom.mk"
      - "makes/publish.mk"
      - "makes/shared/**"
      - "Makefile"
      - "tox.ini"
      - "scripts/deptry_scan.py"
      - "scripts/security/**"
      - "scripts/sbom/**"
      - "scripts/release/**"
      - "scripts/bijux-rar/**"
  pull_request:
    paths:
      - ".github/workflows/bijux-rar-ci.yml"
      - "packages/bijux-rar/**"
      - "apis/bijux-rar/**"
      - "configs/bijux-rar/**"
      - "makes/bijux-rar/**"
      - "makes/lint.mk"
      - "makes/test.mk"
      - "makes/quality.mk"
      - "makes/security.mk"
      - "makes/sbom.mk"
      - "makes/publish.mk"
      - "makes/shared/**"
      - "Makefile"
      - "tox.ini"
      - "scripts/deptry_scan.py"
      - "scripts/security/**"
      - "scripts/sbom/**"
      - "scripts/release/**"
      - "scripts/bijux-rar/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bijux-rar-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACTS_DIR: artifacts/bijux-rar
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/bijux-rar/pyproject.toml
            tox.ini

      - name: Run tests
        run: make -C packages/bijux-rar test

      - name: Upload test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-rar-test
          path: ${{ env.ARTIFACTS_DIR }}/test
          if-no-files-found: ignore
          retention-days: 14

  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [quality, security, docs, build, api, sbom]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/bijux-rar/pyproject.toml
            tox.ini

      - uses: actions/setup-node@v4
        if: ${{ matrix.target == 'api' }}
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        if: ${{ matrix.target == 'api' }}
        with:
          distribution: temurin
          java-version: "17"

      - name: Run ${{ matrix.target }}
        run: make -C packages/bijux-rar ${{ matrix.target }}

      - name: Upload artifacts
        if: ${{ always() && hashFiles(format('{0}/{1}/**', env.ARTIFACTS_DIR, matrix.target)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-rar-${{ matrix.target }}
          path: ${{ env.ARTIFACTS_DIR }}/${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    needs: [tests, checks]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/bijux-rar/pyproject.toml
            tox.ini

      - name: Run lint
        run: make -C packages/bijux-rar lint

      - name: Upload lint artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-rar-lint
          path: ${{ env.ARTIFACTS_DIR }}/lint
          if-no-files-found: ignore
          retention-days: 14
