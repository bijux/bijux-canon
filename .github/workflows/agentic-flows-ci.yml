name: agentic-flows CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".github/workflows/agentic-flows-ci.yml"
      - "packages/agentic-flows/**"
      - "configs/agentic-flows/**"
      - "makes/agentic-flows/**"
      - "makes/shared/**"
      - "Makefile"
      - "tox.ini"
      - "scripts/deptry_scan.py"
  pull_request:
    paths:
      - ".github/workflows/agentic-flows-ci.yml"
      - "packages/agentic-flows/**"
      - "configs/agentic-flows/**"
      - "makes/agentic-flows/**"
      - "makes/shared/**"
      - "Makefile"
      - "tox.ini"
      - "scripts/deptry_scan.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agentic-flows-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/agentic-flows/pyproject.toml
            tox.ini

      - name: Run tests
        run: make -C packages/agentic-flows test

      - name: Enforce coverage floors
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G "packages/agentic-flows/src/agentic_flows/providers/*" > /dev/null; then
            python -m coverage report \
              --rcfile configs/agentic-flows/coveragerc.ini \
              --data-file packages/agentic-flows/artifacts/test/.coverage \
              --include "packages/agentic-flows/src/agentic_flows/providers/*" \
              --fail-under=65
          fi
          if [ -f "packages/agentic-flows/src/agentic_flows/interfaces/cli.py" ]; then
            python -m coverage report \
              --rcfile configs/agentic-flows/coveragerc.ini \
              --data-file packages/agentic-flows/artifacts/test/.coverage \
              --include "packages/agentic-flows/src/agentic_flows/interfaces/cli.py" \
              --fail-under=60
          fi
          if compgen -G "packages/agentic-flows/src/agentic_flows/api/*" > /dev/null; then
            python -m coverage report \
              --rcfile configs/agentic-flows/coveragerc.ini \
              --data-file packages/agentic-flows/artifacts/test/.coverage \
              --include "packages/agentic-flows/src/agentic_flows/api/*" \
              --fail-under=75
          fi

      - name: Upload test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: agentic-flows-test
          path: packages/agentic-flows/artifacts/test
          if-no-files-found: ignore
          retention-days: 14

  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - quality
          - security
          - docs
          - build
          - sbom
          - api
          - architecture-check
          - openapi-drift

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/agentic-flows/pyproject.toml
            tox.ini

      - uses: actions/setup-node@v4
        if: ${{ matrix.target == 'api' }}
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        if: ${{ matrix.target == 'api' }}
        with:
          distribution: temurin
          java-version: "17"

      - name: Run ${{ matrix.target }}
        run: make -C packages/agentic-flows ${{ matrix.target }}

      - name: Upload artifacts
        if: ${{ always() && hashFiles(format('packages/agentic-flows/artifacts/{0}/**', matrix.target)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: agentic-flows-${{ matrix.target }}
          path: packages/agentic-flows/artifacts/${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    needs: [tests, checks]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/agentic-flows/pyproject.toml
            tox.ini

      - name: Run lint
        run: make -C packages/agentic-flows lint

      - name: Upload lint artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: agentic-flows-lint
          path: packages/agentic-flows/artifacts/lint
          if-no-files-found: ignore
          retention-days: 14
