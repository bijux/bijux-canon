name: ci-bijux-canon-ingest

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-bijux-canon-ingest.yml"
      - ".github/workflows/ci-package.yml"
      - "packages/bijux-canon-ingest/**"
      - "apis/bijux-canon-ingest/**"
      - "configs/**"
      - "makes/**"
      - "Makefile"
      - "pyproject.toml"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  pull_request:
    paths:
      - ".github/workflows/ci-bijux-canon-ingest.yml"
      - ".github/workflows/ci-package.yml"
      - "packages/bijux-canon-ingest/**"
      - "apis/bijux-canon-ingest/**"
      - "configs/**"
      - "makes/**"
      - "Makefile"
      - "pyproject.toml"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci-package.yml
    with:
      package_slug: bijux-canon-ingest
      package_dir: packages/bijux-canon-ingest
      artifacts_dir: artifacts/bijux-canon-ingest
      cache_dependency_path: |
        packages/bijux-canon-ingest/pyproject.toml
        pyproject.toml
        tox.ini
      test_python_versions: '["3.11", "3.12", "3.13"]'
