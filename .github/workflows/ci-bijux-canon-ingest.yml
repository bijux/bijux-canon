name: ci-bijux-canon-ingest

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-bijux-canon-ingest.yml"
      - "packages/bijux-canon-ingest/**"
      - "apis/bijux-canon-ingest/**"
      - "makes/lint.mk"
      - "makes/test.mk"
      - "makes/api.mk"
      - "makes/build.mk"
      - "makes/quality.mk"
      - "makes/security.mk"
      - "makes/sbom.mk"
      - "makes/publish.mk"
      - "makes/shared/**"
      - "Makefile"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  pull_request:
    paths:
      - ".github/workflows/ci-bijux-canon-ingest.yml"
      - "packages/bijux-canon-ingest/**"
      - "apis/bijux-canon-ingest/**"
      - "makes/lint.mk"
      - "makes/test.mk"
      - "makes/api.mk"
      - "makes/build.mk"
      - "makes/quality.mk"
      - "makes/security.mk"
      - "makes/sbom.mk"
      - "makes/publish.mk"
      - "makes/shared/**"
      - "Makefile"
      - "tox.ini"
      - "packages/bijux-canon-dev/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-bijux-canon-ingest-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACTS_DIR: artifacts/bijux-canon-ingest
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            packages/bijux-canon-ingest/pyproject.toml
            tox.ini

      - name: Run tests
        run: make -C packages/bijux-canon-ingest test

      - name: Upload test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-canon-ingest-test-py${{ matrix.python-version }}
          path: ${{ env.ARTIFACTS_DIR }}/test
          if-no-files-found: ignore
          retention-days: 14

  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [quality, security, docs, build, api, sbom]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/bijux-canon-ingest/pyproject.toml
            tox.ini

      - uses: actions/setup-node@v4
        if: ${{ matrix.target == 'api' }}
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        if: ${{ matrix.target == 'api' }}
        with:
          distribution: temurin
          java-version: "17"

      - name: Run ${{ matrix.target }}
        run: make -C packages/bijux-canon-ingest ${{ matrix.target }}

      - name: Upload artifacts
        if: ${{ always() && hashFiles(format('{0}/{1}/**', env.ARTIFACTS_DIR, matrix.target)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-canon-ingest-${{ matrix.target }}
          path: ${{ env.ARTIFACTS_DIR }}/${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    needs: [tests, checks]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/bijux-canon-ingest/pyproject.toml
            tox.ini

      - name: Run lint
        run: make -C packages/bijux-canon-ingest lint

      - name: Upload lint artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: bijux-canon-ingest-lint
          path: ${{ env.ARTIFACTS_DIR }}/lint
          if-no-files-found: ignore
          retention-days: 14
