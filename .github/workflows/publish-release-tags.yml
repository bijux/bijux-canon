name: publish-release-tags

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Repository release tag to fan out, for example v0.3.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release-tags-${{ github.event_name == 'workflow_dispatch' && inputs.version_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-release-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configure Git identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Select release trigger packages
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' > "$RUNNER_TEMP/release-trigger-packages.txt"
          import tomllib
          from pathlib import Path

          workspace = tomllib.loads(Path("pyproject.toml").read_text())
          canon = workspace["tool"]["bijux_canon"]
          public_release_packages = set(canon["public_release_packages"])
          release_trigger_packages = [
              package
              for package in canon["primary_packages"]
              if package in public_release_packages
          ]
          for package in release_trigger_packages:
              print(package)
          PY

      - name: Push package release tags
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version_tag || github.ref_name }}
        run: |
          set -euo pipefail
          git fetch --tags --force origin
          release_target="$(git rev-list -n 1 "${RELEASE_TAG}")"
          [ -n "${release_target}" ] || {
            echo "Release tag ${RELEASE_TAG} does not resolve to a commit" >&2
            exit 1
          }
          while IFS= read -r package_slug; do
            [ -n "${package_slug}" ] || continue
            package_tag="${package_slug}/${RELEASE_TAG}"
            git tag -fa "${package_tag}" -m "${package_tag}" "${release_target}"
            git push origin "refs/tags/${package_tag}" --force
          done < "$RUNNER_TEMP/release-trigger-packages.txt"
