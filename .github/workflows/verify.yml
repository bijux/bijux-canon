      - main
    paths:
      - ".github/workflows/**"
      - "apis/**"
      - "configs/**"
      - "docs/**"
      - "makes/**"
      - "packages/**"
      - Makefile
      - mkdocs.shared.yml
      - mkdocs.yml
      - pyproject.toml
      - tox.ini
      - uv.lock
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "apis/**"
      - "configs/**"
      - "docs/**"
      - "makes/**"
      - "packages/**"
      - Makefile
      - mkdocs.shared.yml
      - mkdocs.yml
      - pyproject.toml
      - tox.ini
      - uv.lock
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: "verify-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  repository:
    name: repository-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
