name: publish-bijux-canon-index

on:
  push:
    tags:
      - "bijux-canon-index/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/publish-package.yml
    with:
      package_slug: bijux-canon-index
      package_dir: packages/bijux-canon-index
      artifacts_dir: artifacts/bijux-canon-index
      cache_dependency_path: |
        packages/bijux-canon-index/pyproject.toml
        pyproject.toml
      build_command: make -C packages/bijux-canon-index build
      dist_subdir: release
