name: publish-bijux-canon-index

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    uses: ./.github/workflows/build-release-artifacts.yml
    with:
      package_slug: bijux-canon-index
      package_dir: packages/bijux-canon-index
      artifacts_dir: artifacts/bijux-canon-index
      cache_dependency_path: |
        packages/bijux-canon-index/pyproject.toml
        pyproject.toml
      build_targets: build
      dist_subdir: release

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download publish artifacts
        uses: actions/download-artifact@v5
        with:
          name: bijux-canon-index-pypi-dist
          path: .github/tmp/bijux-canon-index-dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: .github/tmp/bijux-canon-index-dist
          skip-existing: true
