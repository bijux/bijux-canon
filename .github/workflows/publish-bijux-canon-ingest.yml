name: publish-bijux-canon-ingest

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    uses: ./.github/workflows/build-release-artifacts.yml
    with:
      package_slug: bijux-canon-ingest
      package_dir: packages/bijux-canon-ingest
      artifacts_dir: artifacts/bijux-canon-ingest
      cache_dependency_path: |
        packages/bijux-canon-ingest/pyproject.toml
        pyproject.toml
      build_targets: "build sbom"
      upload_paths: |
        artifacts/bijux-canon-ingest/build/*
        artifacts/bijux-canon-ingest/sbom/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download publish artifacts
        uses: actions/download-artifact@v5
        with:
          name: bijux-canon-ingest-pypi-dist
          path: .github/tmp/bijux-canon-ingest-dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: .github/tmp/bijux-canon-ingest-dist
          skip-existing: true
