strict: true
use_directory_urls: true
dev_addr: 127.0.0.1:8000

validation:
  omitted_files: ignore

theme:
  name: material
  language: en
  logo: assets/bijux_logo_hq.png
  favicon: assets/site-icons/favicon.ico
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.tracking
    - navigation.instant
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

plugins:
  - search
  - autorefs
  - redirects:
      redirect_maps:
        bijux-canon-dev/index.md: bijux-canon-maintain/index.md
        bijux-canon-dev/package-overview.md: bijux-canon-maintain/package-overview.md
        bijux-canon-dev/scope-and-non-goals.md: bijux-canon-maintain/scope-and-non-goals.md
        bijux-canon-dev/module-map.md: bijux-canon-maintain/module-map.md
        bijux-canon-dev/quality-gates.md: bijux-canon-maintain/quality-gates.md
        bijux-canon-dev/security-gates.md: bijux-canon-maintain/security-gates.md
        bijux-canon-dev/schema-governance.md: bijux-canon-maintain/schema-governance.md
        bijux-canon-dev/release-support.md: bijux-canon-maintain/release-support.md
        bijux-canon-dev/sbom-and-supply-chain.md: bijux-canon-maintain/sbom-and-supply-chain.md
        bijux-canon-dev/operating-guidelines.md: bijux-canon-maintain/operating-guidelines.md
  - git-revision-date-localized:
      enable_creation_date: false
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  homepage: https://bijux.io/
  bijux:
    repository: bijux-canon
    docs_package: bijux-canon-dev
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bijux

extra_css:
  - assets/styles/extra.css

extra_javascript:
  - assets/javascripts/vendor/mermaid-11.6.0.min.js
  - assets/javascripts/mermaid-init.js
  - assets/javascripts/navigation-sync.js

copyright: "© 2026 Bijan Mousavi <bijan@bijux.io>"
