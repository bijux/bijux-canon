strict: true
use_directory_urls: true
dev_addr: 127.0.0.1:8000

validation:
  omitted_files: ignore

theme:
  name: material
  language: en
  logo: assets/bijux_logo_hq.png
  favicon: assets/site-icons/favicon.ico
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.tracking
    - navigation.instant
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme)"
      primary: teal
      accent: cyan
      toggle:
        icon: material/theme-light-dark
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/moon-waning-crescent
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/white-balance-sunny
        name: Switch to system mode

plugins:
  - search
  - autorefs
  - redirects:
      redirect_maps:
        bijux-canon/index.md: 01-bijux-canon/index.md
        bijux-canon-dev/index.md: 07-bijux-canon-maintain/index.md
        bijux-canon-dev/package-overview.md: 07-bijux-canon-maintain/bijux-canon-dev/package-overview.md
        bijux-canon-dev/scope-and-non-goals.md: 07-bijux-canon-maintain/bijux-canon-dev/scope-and-non-goals.md
        bijux-canon-dev/module-map.md: 07-bijux-canon-maintain/bijux-canon-dev/module-map.md
        bijux-canon-dev/quality-gates.md: 07-bijux-canon-maintain/bijux-canon-dev/quality-gates.md
        bijux-canon-dev/security-gates.md: 07-bijux-canon-maintain/bijux-canon-dev/security-gates.md
        bijux-canon-dev/schema-governance.md: 07-bijux-canon-maintain/bijux-canon-dev/schema-governance.md
        bijux-canon-dev/release-support.md: 07-bijux-canon-maintain/bijux-canon-dev/release-support.md
        bijux-canon-dev/sbom-and-supply-chain.md: 07-bijux-canon-maintain/bijux-canon-dev/sbom-and-supply-chain.md
        bijux-canon-dev/operating-guidelines.md: 07-bijux-canon-maintain/bijux-canon-dev/operating-guidelines.md
        bijux-canon/platform-overview.md: 01-bijux-canon/foundation/platform-overview.md
        bijux-canon/repository-scope.md: 01-bijux-canon/foundation/repository-scope.md
        bijux-canon/workspace-layout.md: 01-bijux-canon/foundation/workspace-layout.md
        bijux-canon/package-map.md: 01-bijux-canon/foundation/package-map.md
        bijux-canon/documentation-system.md: 01-bijux-canon/foundation/documentation-system.md
        bijux-canon/api-and-schema-governance.md: 01-bijux-canon/operations/api-and-schema-governance.md
        bijux-canon/local-development.md: 01-bijux-canon/operations/local-development.md
        bijux-canon/testing-and-validation.md: 01-bijux-canon/operations/testing-and-validation.md
        bijux-canon/release-and-versioning.md: 01-bijux-canon/operations/release-and-versioning.md
        08-compat-packages/agentic-flows/index.md: 08-compat-packages/catalog/agentic-flows.md
        08-compat-packages/bijux-agent/index.md: 08-compat-packages/catalog/bijux-agent.md
        08-compat-packages/bijux-rag/index.md: 08-compat-packages/catalog/bijux-rag.md
        08-compat-packages/bijux-rar/index.md: 08-compat-packages/catalog/bijux-rar.md
        08-compat-packages/bijux-vex/index.md: 08-compat-packages/catalog/bijux-vex.md
        08-compat-packages/legacy-name-map.md: 08-compat-packages/catalog/legacy-name-map.md
        08-compat-packages/package-behavior.md: 08-compat-packages/catalog/package-behavior.md
        08-compat-packages/import-surfaces.md: 08-compat-packages/catalog/import-surfaces.md
        08-compat-packages/command-surfaces.md: 08-compat-packages/catalog/command-surfaces.md
        08-compat-packages/compatibility-overview.md: 08-compat-packages/migration/compatibility-overview.md
        08-compat-packages/migration-guidance.md: 08-compat-packages/migration/migration-guidance.md
        08-compat-packages/repository-consolidation.md: 08-compat-packages/migration/repository-consolidation.md
        08-compat-packages/release-policy.md: 08-compat-packages/migration/release-policy.md
        08-compat-packages/validation-strategy.md: 08-compat-packages/migration/validation-strategy.md
        08-compat-packages/retirement-conditions.md: 08-compat-packages/migration/retirement-conditions.md
        07-bijux-canon-maintain/gh-workflows/publish.md: 07-bijux-canon-maintain/gh-workflows/release-workflows.md
  - git-revision-date-localized:
      enable_creation_date: false
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  homepage: https://bijux.io/
  bijux:
    repository: bijux-canon
    docs_package: bijux-canon-dev
    nav_mode: default
    theme_key: bijux:theme
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bijux

extra_css:
  - assets/styles/extra.css

extra_javascript:
  - assets/javascripts/vendor/mermaid-11.6.0.min.js
  - assets/javascripts/mermaid-init.js
  - assets/javascripts/shell/theme-persistence.js
  - assets/javascripts/shell/viewport-profile.js
  - assets/javascripts/shell/nav-state.js
  - assets/javascripts/shell/detail-tabs.js
  - assets/javascripts/shell/nav-reveal.js
  - assets/javascripts/shell/bootstrap.js
  - assets/javascripts/navigation-sync.js
  - assets/javascripts/external-links.js

copyright: "© 2026 Bijan Mousavi <bijan@bijux.io>"
