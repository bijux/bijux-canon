openapi: 3.1.0
info:
  title: bijux-canon-ingest API
  summary: Deterministic chunking, indexing, retrieval, and answer assembly.
  description: The bijux-canon-ingest HTTP API exposes the v1 ingest boundary for
    chunk generation, index construction, retrieval, and answer synthesis. It keeps
    the ingestion lifecycle explicit so operators can trace what was chunked, indexed,
    retrieved, and answered.
  contact:
    name: Bijux
    url: https://github.com/bijux/bijux-canon
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: v1
servers:
- url: /
paths:
  /v1/healthz:
    get:
      tags:
      - Health
      summary: Report adapter health
      description: Return a lightweight liveness signal for the ingest HTTP adapter.
      operationId: getIngestHealth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/chunks:
    post:
      tags:
      - Chunking
      summary: Chunk documents
      description: Split submitted documents into chunk payloads and optionally include
        embeddings for each emitted chunk.
      operationId: chunkDocuments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChunkRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChunkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/index/build:
    post:
      tags:
      - Indexing
      summary: Build an index
      description: Chunk the submitted documents, build an index using the requested
        backend, and return the stable identifier for later retrieval.
      operationId: buildIndex
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndexBuildRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexBuildResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/retrieve:
    post:
      tags:
      - Retrieval
      summary: Retrieve ranked candidates
      description: Run retrieval against a built index and return the ranked candidate
        chunks that satisfy the query and optional filters.
      operationId: retrieveCandidates
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrieveRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/ask:
    post:
      tags:
      - Retrieval
      summary: Answer a query from the index
      description: Retrieve candidates from the selected index, optionally rerank
        them, and return a synthesized answer with explicit citations.
      operationId: answerQuery
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AskRequest:
      properties:
        index_id:
          type: string
          minLength: 1
          title: Index Id
          description: Index identifier returned by the index build endpoint.
        query:
          type: string
          minLength: 1
          title: Query
          description: Reader query text.
        top_k:
          type: integer
          minimum: 1.0
          title: Top K
          description: Maximum number of retrieval candidates to use for answering.
          default: 5
        rerank:
          type: boolean
          title: Rerank
          description: Whether the answer flow should rerank retrieved candidates.
          default: true
        filters:
          additionalProperties:
            type: string
          type: object
          title: Filters
          description: Optional metadata filters applied before answer synthesis.
      type: object
      required:
      - index_id
      - query
      title: AskRequest
    AskResponse:
      properties:
        answer:
          type: string
          title: Answer
          description: Reader-facing answer synthesized by the API.
        citations:
          items:
            $ref: '#/components/schemas/CitationModel'
          type: array
          title: Citations
          description: Evidence citations supporting the returned answer.
        candidates:
          items:
            $ref: '#/components/schemas/CandidateModel'
          type: array
          title: Candidates
          description: Ranked candidates that informed the answer.
      type: object
      required:
      - answer
      - citations
      - candidates
      title: AskResponse
    CandidateModel:
      properties:
        score:
          type: number
          title: Score
          description: Score assigned to the retrieval candidate.
        chunk:
          title: Chunk
          description: Chunk payload associated with the candidate.
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
          description: Candidate metadata preserved from indexing time.
      type: object
      required:
      - score
      - chunk
      title: CandidateModel
    ChunkOut:
      properties:
        doc_id:
          type: string
          title: Doc Id
          description: Source document identifier for the chunk.
        text:
          type: string
          title: Text
          description: Chunk text returned by the pipeline.
        start:
          type: integer
          title: Start
          description: Inclusive character offset where the chunk starts.
        end:
          type: integer
          title: End
          description: Exclusive character offset where the chunk ends.
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
          description: Chunk metadata preserved by the ingest pipeline.
        embedding:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: Embedding
          description: Optional embedding values when embeddings are requested.
        chunk_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Chunk Id
          description: Stable chunk identifier when one has been materialized.
      type: object
      required:
      - doc_id
      - text
      - start
      - end
      title: ChunkOut
    ChunkRequest:
      properties:
        chunk_size:
          type: integer
          minimum: 1.0
          title: Chunk Size
          description: Target chunk size used by the chunking stage.
          default: 128
        overlap:
          type: integer
          minimum: 0.0
          title: Overlap
          description: Character overlap preserved between adjacent chunks.
          default: 0
        include_embeddings:
          type: boolean
          title: Include Embeddings
          description: Whether chunk embeddings should be included in the response.
          default: true
        docs:
          items:
            $ref: '#/components/schemas/DocIn'
          type: array
          minItems: 1
          title: Docs
          description: Documents that should be chunked by the API.
      type: object
      required:
      - docs
      title: ChunkRequest
    ChunkResponse:
      properties:
        chunks:
          items:
            $ref: '#/components/schemas/ChunkOut'
          type: array
          title: Chunks
          description: Chunk sequence produced from the submitted documents.
      type: object
      required:
      - chunks
      title: ChunkResponse
    CitationModel:
      properties:
        doc_id:
          type: string
          title: Doc Id
          description: Source document identifier.
        chunk_id:
          type: string
          title: Chunk Id
          description: Chunk identifier cited by the answer.
        start:
          type: integer
          title: Start
          description: Inclusive cited start offset.
        end:
          type: integer
          title: End
          description: Exclusive cited end offset.
        text:
          anyOf:
          - type: string
          - type: 'null'
          title: Text
          description: Optional cited text span carried with the citation.
      type: object
      required:
      - doc_id
      - chunk_id
      - start
      - end
      title: CitationModel
    DocIn:
      properties:
        doc_id:
          type: string
          minLength: 1
          title: Doc Id
          description: Stable document identifier.
        text:
          type: string
          minLength: 1
          title: Text
          description: Full document text to process.
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
          description: Optional reader-facing title used for retrieval displays.
        category:
          anyOf:
          - type: string
          - type: 'null'
          title: Category
          description: Optional category label used for filtering or grouping.
      type: object
      required:
      - doc_id
      - text
      title: DocIn
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          description: Liveness indicator for the HTTP adapter.
      type: object
      required:
      - ok
      title: HealthResponse
    IndexBuildRequest:
      properties:
        docs:
          items:
            $ref: '#/components/schemas/DocIn'
          type: array
          minItems: 1
          title: Docs
          description: Documents that should be indexed into a retrievable store.
        backend:
          type: string
          pattern: ^(bm25|numpy-cosine)$
          title: Backend
          description: Retrieval backend used to build the index.
        chunk_size:
          type: integer
          minimum: 1.0
          title: Chunk Size
          description: Chunk size used during index construction.
          default: 512
        overlap:
          type: integer
          minimum: 0.0
          title: Overlap
          description: Chunk overlap preserved during index construction.
          default: 50
      type: object
      required:
      - docs
      - backend
      title: IndexBuildRequest
    IndexBuildResponse:
      properties:
        index_id:
          type: string
          title: Index Id
          description: Stable identifier assigned to the built index.
        fingerprint:
          type: string
          title: Fingerprint
          description: Fingerprint of the built index contents and configuration.
        schema_version:
          type: integer
          title: Schema Version
          description: Schema version emitted by the index representation.
      type: object
      required:
      - index_id
      - fingerprint
      - schema_version
      title: IndexBuildResponse
    RetrieveRequest:
      properties:
        index_id:
          type: string
          minLength: 1
          title: Index Id
          description: Index identifier returned by the index build endpoint.
        query:
          type: string
          minLength: 1
          title: Query
          description: Reader query text.
        top_k:
          type: integer
          minimum: 1.0
          title: Top K
          description: Maximum number of ranked retrieval candidates to return.
          default: 5
        filters:
          additionalProperties:
            type: string
          type: object
          title: Filters
          description: Optional metadata filters applied during retrieval.
      type: object
      required:
      - index_id
      - query
      title: RetrieveRequest
    RetrieveResponse:
      properties:
        candidates:
          items:
            $ref: '#/components/schemas/CandidateModel'
          type: array
          title: Candidates
          description: Ranked retrieval candidates returned for the query.
      type: object
      required:
      - candidates
      title: RetrieveResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
tags:
- name: Chunking
  description: Endpoints that split raw documents into chunk payloads.
- name: Indexing
  description: Endpoints that build and manage retrievable indexes.
- name: Retrieval
  description: Endpoints that retrieve evidence or synthesize answers.
- name: Health
  description: Operational health signals for the HTTP adapter.
