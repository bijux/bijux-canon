openapi: 3.1.0
info:
  title: bijux-canon-index API
  summary: Contract-driven vector execution and replayable retrieval.
  description: The bijux-canon-index HTTP API exposes the v1 surface for deterministic
    and bounded vector execution. It separates capability discovery, artifact materialization,
    and query execution so operators can review the contract they are invoking before
    they ship it.
  contact:
    name: Bijux
    url: https://github.com/bijux/bijux-canon
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: v1
servers:
- url: /
paths:
  /capabilities:
    get:
      tags:
      - Discovery
      summary: Describe backend capabilities
      description: Report the active execution backend, supported contracts, storage
        backends, vector store capabilities, and ANN readiness in one envelope.
      operationId: describeBackendCapabilities
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Correlation-Id
      responses:
        '200':
          description: Capability report returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackendCapabilitiesReport'
              examples:
                capabilities:
                  value:
                    backend: sqlite
                    contracts:
                    - deterministic
                    - non_deterministic
                    deterministic_query: true
                    supports_ann: false
                    replayable: true
                    metrics:
                    - l2
                    - cosine
                    max_vector_size: 4096
                    isolation_level: read_committed
                    execution_modes:
                    - strict
                    - bounded
                    - exploratory
                    ann_status: unavailable
                    storage_backends: []
                    vector_stores: []
                    plugins: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /artifacts:
    get:
      tags:
      - Discovery
      summary: List execution artifacts
      description: Return artifact identifiers known to the current backend so operators
        can inspect or reuse previously materialized execution state.
      operationId: listExecutionArtifacts
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      - name: X-Correlation-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Correlation-Id
      responses:
        '200':
          description: Artifact inventory returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListArtifactsResponse'
              examples:
                artifacts:
                  value:
                    artifacts:
                    - art-1
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /runs:
    get:
      tags:
      - Discovery
      summary: List execution runs
      description: Return recorded run identifiers from the run store for audit, replay,
        or support workflows.
      operationId: listExecutionRuns
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      - name: X-Correlation-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Correlation-Id
      responses:
        '200':
          description: Run inventory returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRunsResponse'
              examples:
                runs:
                  value:
                    runs:
                    - run-1
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /create:
    post:
      tags:
      - Materialization
      summary: Reserve a logical corpus name
      description: Create a logical corpus entry before ingestion. The endpoint is
        intentionally small so teams can separate naming and governance from later
        content writes.
      operationId: createCorpus
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Correlation-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
            examples:
              create:
                value:
                  name: my-corpus
      responses:
        '200':
          description: Corpus name reserved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
              examples:
                created:
                  value:
                    name: my-corpus
                    status: created
        '400':
          content:
            application/json:
              examples:
                refusal:
                  value:
                    error:
                      reason: determinism_violation
                      message: '[INV-000] Deterministic execution requires a deterministic
                        vector store'
                      remediation: Use deterministic inputs or switch to non_deterministic
                        contract with declared randomness.
          description: Bad Request
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ingest:
    post:
      tags:
      - Materialization
      summary: Ingest documents and vectors
      description: Persist documents and either supplied vectors or embedding-derived
        vectors, then return the ingest count and resolved correlation identifier.
      operationId: ingestDocuments
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Correlation-Id
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
            examples:
              ingest:
                value:
                  documents:
                  - hello
                  vectors:
                  - - 0.0
                    - 1.0
                    - 0.0
                  vector_store: faiss
                  vector_store_uri: index.faiss
      responses:
        '200':
          description: Documents ingested successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
              examples:
                ingested:
                  value:
                    ingested: 1
                    correlation_id: req-example
        '400':
          content:
            application/json:
              examples:
                refusal:
                  value:
                    error:
                      reason: determinism_violation
                      message: '[INV-000] Deterministic execution requires a deterministic
                        vector store'
                      remediation: Use deterministic inputs or switch to non_deterministic
                        contract with declared randomness.
          description: Bad Request
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /artifact:
    post:
      tags:
      - Materialization
      summary: Materialize an execution artifact
      description: Freeze the current corpus and vector state into an execution artifact
        with a declared contract so later executions can be audited and replayed.
      operationId: materializeExecutionArtifact
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Correlation-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionArtifactRequest'
            examples:
              artifact:
                value:
                  execution_contract: deterministic
      responses:
        '200':
          description: Execution artifact materialized successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactResponse'
              examples:
                artifact:
                  value:
                    artifact_id: art-1
                    execution_contract: deterministic
                    execution_contract_status: stable
                    replayable: true
        '400':
          content:
            application/json:
              examples:
                refusal:
                  value:
                    error:
                      reason: determinism_violation
                      message: '[INV-000] Deterministic execution requires a deterministic
                        vector store'
                      remediation: Use deterministic inputs or switch to non_deterministic
                        contract with declared randomness.
          description: Bad Request
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /execute:
    post:
      tags:
      - Execution
      summary: Execute a vector query
      description: Execute a deterministic or bounded retrieval request against a
        materialized artifact and return the result identifiers plus replay metadata.
      operationId: executeVectorQuery
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Correlation-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionRequestPayload'
            examples:
              execute:
                value:
                  artifact_id: art-1
                  vector:
                  - 0.0
                  - 1.0
                  - 0.0
                  top_k: 3
                  execution_contract: deterministic
                  execution_intent: exact_validation
                  execution_mode: strict
      responses:
        '200':
          description: Execution completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteResponse'
              examples:
                execute:
                  value:
                    results:
                    - vec-1
                    correlation_id: req-example
                    execution_contract: deterministic
                    execution_contract_status: stable
                    replayable: true
                    execution_id: exec-1
        '422':
          content:
            application/json:
              examples:
                refusal:
                  value:
                    error:
                      reason: determinism_violation
                      message: '[INV-000] Deterministic execution requires a deterministic
                        vector store'
                      remediation: Use deterministic inputs or switch to non_deterministic
                        contract with declared randomness.
          description: Unprocessable Content
  /explain:
    post:
      tags:
      - Execution
      summary: Explain a result
      description: Resolve a result identifier back to the document, chunk, vector,
        and execution context that produced it.
      operationId: explainExecutionResult
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Correlation-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExplainRequest'
            examples:
              explain:
                value:
                  result_id: res-1
      responses:
        '200':
          description: Result explanation returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplainResponse'
              examples:
                explain:
                  value:
                    document_id: doc-1
                    chunk_id: chunk-1
                    vector_id: res-1
                    artifact_id: art-1
                    metric: l2
                    score: 0.99
                    correlation_id: req-example
                    execution_contract: deterministic
                    execution_contract_status: stable
                    replayable: true
                    execution_id: exec-1
        '400':
          content:
            application/json:
              examples:
                refusal:
                  value:
                    error:
                      reason: determinism_violation
                      message: '[INV-000] Deterministic execution requires a deterministic
                        vector store'
                      remediation: Use deterministic inputs or switch to non_deterministic
                        contract with declared randomness.
          description: Bad Request
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /replay:
    post:
      tags:
      - Execution
      summary: Replay an execution outcome
      description: Replay a prior execution contract against the currently available
        artifact and report whether the replay stayed within the declared equivalence
        boundary.
      operationId: replayExecutionOutcome
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Correlation-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionRequestPayload'
            examples:
              replay:
                value:
                  artifact_id: art-1
                  request_text: hello
      responses:
        '200':
          description: Replay completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplayResponse'
              examples:
                replay:
                  value:
                    matches: true
                    original_fingerprint: orig-fp
                    replay_fingerprint: replay-fp
                    details:
                      status: matched
                    nondeterministic_sources: []
                    execution_contract: deterministic
                    execution_contract_status: stable
                    replayable: true
                    execution_id: exec-1
        '400':
          content:
            application/json:
              examples:
                refusal:
                  value:
                    error:
                      reason: determinism_violation
                      message: '[INV-000] Deterministic execution requires a deterministic
                        vector store'
                      remediation: Use deterministic inputs or switch to non_deterministic
                        contract with declared randomness.
          description: Bad Request
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ArtifactResponse:
      properties:
        artifact_id:
          type: string
          title: Artifact Id
          description: Identifier of the execution artifact materialized by the API.
        execution_contract:
          type: string
          title: Execution Contract
          description: Execution contract currently attached to the artifact.
        execution_contract_status:
          type: string
          title: Execution Contract Status
          description: Human-readable stability marker for the chosen contract.
        replayable:
          type: boolean
          title: Replayable
          description: Whether the artifact can be replayed under its declared contract.
      additionalProperties: false
      type: object
      required:
      - artifact_id
      - execution_contract
      - execution_contract_status
      - replayable
      title: ArtifactResponse
    BackendCapabilitiesReport:
      properties:
        backend:
          type: string
          title: Backend
        contracts:
          items:
            type: string
          type: array
          title: Contracts
        deterministic_query:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Deterministic Query
        supports_ann:
          type: boolean
          title: Supports Ann
        replayable:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Replayable
        metrics:
          items:
            type: string
          type: array
          title: Metrics
        max_vector_size:
          anyOf:
          - type: integer
          - type: 'null'
          title: Max Vector Size
        isolation_level:
          anyOf:
          - type: string
          - type: 'null'
          title: Isolation Level
        execution_modes:
          items:
            type: string
          type: array
          title: Execution Modes
        ann_status:
          type: string
          title: Ann Status
        storage_backends:
          items:
            $ref: '#/components/schemas/StorageBackendDescriptor'
          type: array
          title: Storage Backends
        vector_stores:
          items:
            $ref: '#/components/schemas/VectorStoreDescriptor'
          type: array
          title: Vector Stores
        plugins:
          additionalProperties:
            items:
              additionalProperties: true
              type: object
            type: array
          type: object
          title: Plugins
        nd:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Nd
      additionalProperties: false
      type: object
      required:
      - backend
      - contracts
      - deterministic_query
      - supports_ann
      - replayable
      - metrics
      - max_vector_size
      - isolation_level
      - execution_modes
      - ann_status
      - storage_backends
      - vector_stores
      - plugins
      title: BackendCapabilitiesReport
    CreateRequest:
      properties:
        name:
          type: string
          minLength: 1
          title: Name
      additionalProperties: false
      type: object
      required:
      - name
      title: CreateRequest
    CreateResponse:
      properties:
        name:
          type: string
          title: Name
          description: Logical corpus name reserved by the API.
        status:
          type: string
          title: Status
          description: Lifecycle state returned after the create request.
      additionalProperties: false
      type: object
      required:
      - name
      - status
      title: CreateResponse
    ExecuteResponse:
      properties:
        results:
          items:
            type: string
          type: array
          title: Results
          description: Ordered vector identifiers returned by the execution request.
        correlation_id:
          type: string
          title: Correlation Id
          description: Correlation identifier attached to the execution lifecycle.
        execution_contract:
          type: string
          title: Execution Contract
          description: Execution contract used to evaluate the query.
        execution_contract_status:
          type: string
          title: Execution Contract Status
          description: Human-readable stability marker for the chosen contract.
        replayable:
          type: boolean
          title: Replayable
          description: Whether the execution result can be replayed faithfully.
        execution_id:
          type: string
          title: Execution Id
          description: Stable execution record identifier written by the run store.
      additionalProperties: false
      type: object
      required:
      - results
      - correlation_id
      - execution_contract
      - execution_contract_status
      - replayable
      - execution_id
      title: ExecuteResponse
    ExecutionArtifactRequest:
      properties:
        execution_contract:
          $ref: '#/components/schemas/ExecutionContract'
        index_mode:
          anyOf:
          - type: string
          - type: 'null'
          title: Index Mode
        vector_store:
          anyOf:
          - type: string
          - type: 'null'
          title: Vector Store
        vector_store_uri:
          anyOf:
          - type: string
          - type: 'null'
          title: Vector Store Uri
        vector_store_options:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Vector Store Options
      additionalProperties: false
      type: object
      required:
      - execution_contract
      title: ExecutionArtifactRequest
    ExecutionBudgetPayload:
      properties:
        max_latency_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: Max Latency Ms
        max_memory_mb:
          anyOf:
          - type: integer
          - type: 'null'
          title: Max Memory Mb
        max_error:
          anyOf:
          - type: number
          - type: 'null'
          title: Max Error
      additionalProperties: false
      type: object
      title: ExecutionBudgetPayload
    ExecutionContract:
      type: string
      enum:
      - deterministic
      - non_deterministic
      title: ExecutionContract
    ExecutionIntent:
      type: string
      enum:
      - exact_validation
      - reproducible_research
      - exploratory_search
      - production_retrieval
      title: ExecutionIntent
    ExecutionMode:
      type: string
      enum:
      - strict
      - bounded
      - exploratory
      title: ExecutionMode
    ExecutionRequestPayload:
      properties:
        artifact_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Artifact Id
        request_text:
          anyOf:
          - type: string
          - type: 'null'
          title: Request Text
        vector:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: Vector
        top_k:
          type: integer
          exclusiveMinimum: 0.0
          title: Top K
          default: 5
        execution_contract:
          $ref: '#/components/schemas/ExecutionContract'
        execution_intent:
          $ref: '#/components/schemas/ExecutionIntent'
        execution_mode:
          $ref: '#/components/schemas/ExecutionMode'
          default: strict
        execution_budget:
          anyOf:
          - $ref: '#/components/schemas/ExecutionBudgetPayload'
          - type: 'null'
        randomness_profile:
          anyOf:
          - $ref: '#/components/schemas/RandomnessProfilePayload'
          - type: 'null'
        nd_profile:
          anyOf:
          - type: string
          - type: 'null'
          title: Nd Profile
        nd_target_recall:
          anyOf:
          - type: number
          - type: 'null'
          title: Nd Target Recall
        nd_latency_budget_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nd Latency Budget Ms
        nd_witness_rate:
          anyOf:
          - type: number
          - type: 'null'
          title: Nd Witness Rate
        nd_witness_sample_k:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nd Witness Sample K
        nd_witness_mode:
          anyOf:
          - type: string
          - type: 'null'
          title: Nd Witness Mode
        nd_build_on_demand:
          type: boolean
          title: Nd Build On Demand
          default: false
        nd_candidate_k:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nd Candidate K
        nd_diversity_lambda:
          anyOf:
          - type: number
          - type: 'null'
          title: Nd Diversity Lambda
        nd_normalize_vectors:
          type: boolean
          title: Nd Normalize Vectors
          default: false
        nd_normalize_query:
          type: boolean
          title: Nd Normalize Query
          default: false
        nd_outlier_threshold:
          anyOf:
          - type: number
          - type: 'null'
          title: Nd Outlier Threshold
        nd_low_signal_margin:
          anyOf:
          - type: number
          - type: 'null'
          title: Nd Low Signal Margin
        nd_adaptive_k:
          type: boolean
          title: Nd Adaptive K
          default: false
        nd_low_signal_refuse:
          type: boolean
          title: Nd Low Signal Refuse
          default: false
        nd_replay_strict:
          type: boolean
          title: Nd Replay Strict
          default: false
        nd_warmup_queries:
          anyOf:
          - type: string
          - type: 'null'
          title: Nd Warmup Queries
        nd_incremental_index:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Nd Incremental Index
        nd_max_candidates:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nd Max Candidates
        nd_max_index_memory_mb:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nd Max Index Memory Mb
        nd_two_stage:
          type: boolean
          title: Nd Two Stage
          default: true
        nd_m:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nd M
        nd_ef_construction:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nd Ef Construction
        nd_ef_search:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nd Ef Search
        nd_max_ef_search:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nd Max Ef Search
        nd_space:
          anyOf:
          - type: string
          - type: 'null'
          title: Nd Space
        correlation_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Correlation Id
        vector_store:
          anyOf:
          - type: string
          - type: 'null'
          title: Vector Store
        vector_store_uri:
          anyOf:
          - type: string
          - type: 'null'
          title: Vector Store Uri
        vector_store_options:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Vector Store Options
      additionalProperties: false
      type: object
      required:
      - execution_contract
      - execution_intent
      title: ExecutionRequestPayload
    ExplainRequest:
      properties:
        result_id:
          type: string
          minLength: 1
          title: Result Id
        artifact_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Artifact Id
      additionalProperties: false
      type: object
      required:
      - result_id
      title: ExplainRequest
    ExplainResponse:
      properties:
        document_id:
          type: string
          title: Document Id
          description: Document that produced the requested result.
        chunk_id:
          type: string
          title: Chunk Id
          description: Chunk that contributed the requested result.
        vector_id:
          type: string
          title: Vector Id
          description: Vector identifier for the explained result.
        artifact_id:
          type: string
          title: Artifact Id
          description: Execution artifact used to resolve the result.
        metric:
          type: string
          title: Metric
          description: Similarity metric used by the artifact.
        score:
          type: number
          title: Score
          description: Score assigned to the result.
        correlation_id:
          type: string
          title: Correlation Id
          description: Correlation identifier of the execution that produced the result.
        execution_contract:
          type: string
          title: Execution Contract
          description: Execution contract used by the originating execution.
        execution_contract_status:
          type: string
          title: Execution Contract Status
          description: Human-readable stability marker for the chosen contract.
        replayable:
