components:
  schemas:
    FlowRunRequest:
      additionalProperties: false
      description: Flow run request; misuse breaks API contract.
      properties:
        dataset_id:
          title: Dataset Id
          type: string
        flow_manifest:
          title: Flow Manifest
          type: string
        inputs_fingerprint:
          title: Inputs Fingerprint
          type: string
        policy_fingerprint:
          title: Policy Fingerprint
          type: string
        run_mode:
          enum:
          - live
          - dry
          - observer
          title: Run Mode
          type: string
      required:
      - flow_manifest
      - inputs_fingerprint
      - run_mode
      - dataset_id
      - policy_fingerprint
      title: FlowRunRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    ReplayRequest:
      additionalProperties: false
      description: Replay request; misuse breaks API contract.
      properties:
        acceptability_threshold:
          enum:
          - exact_match
          - invariant_preserving
          - statistically_bounded
          title: Acceptability Threshold
          type: string
        expected_plan_hash:
          title: Expected Plan Hash
          type: string
        observer_mode:
          title: Observer Mode
          type: boolean
        run_id:
          title: Run Id
          type: string
      required:
      - run_id
      - expected_plan_hash
      - acceptability_threshold
      - observer_mode
      title: ReplayRequest
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  contact:
    name: Bijux
    url: https://github.com/bijux/bijux-canon
  description: The bijux-canon-runtime HTTP API exposes the v1 execution and replay
    surface for flow contracts. It keeps required headers, request envelopes, and
    replay acceptability visible at the boundary so failures are reviewable rather
    than implicit.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  summary: Contract-enforced execution and replay for the runtime layer.
  title: bijux-canon-runtime API
  version: v1
openapi: 3.1.0
paths:
  /api/v1/flows/replay:
    post:
      description: 'Preconditions: required headers are present, determinism level
        is valid, and the replay request is well-formed; acceptable replay means differences
        stay within the declared acceptability threshold; mismatches return FailureEnvelope
        with failure_class set to authority.'
      operationId: replay_flow_api_v1_flows_replay_post
      parameters:
      - in: header
        name: X-Agentic-Gate
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Agentic-Gate
      - in: header
        name: X-Determinism-Level
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Determinism-Level
      - in: header
        name: X-Policy-Fingerprint
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Policy-Fingerprint
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplayRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Replay Flow
  /api/v1/flows/run:
    post:
      description: Deterministic guarantees cover declared contracts and persisted
        envelopes only; runtime environment, external tools, and policy omissions
        are explicitly not guaranteed; replay equivalence is expected to fail when
        headers, policy fingerprints, or dataset identity diverge from the declared
        contract.
      operationId: run_flow_api_v1_flows_run_post
      parameters:
      - in: header
        name: X-Agentic-Gate
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Agentic-Gate
      - in: header
        name: X-Determinism-Level
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Determinism-Level
      - in: header
        name: X-Policy-Fingerprint
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Policy-Fingerprint
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlowRunRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Run Flow
  /api/v1/health:
    get:
      description: Provide a lightweight liveness signal for health checks.
      operationId: health_api_v1_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                title: Response Health Api V1 Health Get
                type: object
          description: Successful Response
      summary: Health
  /api/v1/ready:
    get:
      description: Provide a readiness signal without performing deep dependency checks.
      operationId: ready_api_v1_ready_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Ready
  /health:
    get:
      description: Provide a lightweight liveness signal for health checks.
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                title: Response Health Health Get
                type: object
          description: Successful Response
      summary: Health
  /ready:
    get:
      description: Provide a readiness signal without performing deep dependency checks.
      operationId: ready_ready_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Ready
servers:
- url: /
tags:
- description: Operational liveness and readiness signals for the runtime API.
  name: Health
- description: Flow execution and replay endpoints governed by runtime contracts.
  name: Flows
