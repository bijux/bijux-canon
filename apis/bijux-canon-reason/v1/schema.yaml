openapi: 3.1.0
info:
  title: bijux-canon-reason API
  summary: Deterministic item and run management for the reasoning runtime.
  description: The bijux-canon-reason HTTP API exposes the v1 operational surface
    for managing lightweight item state and creating auditable run artifacts. It is
    intentionally split between simple CRUD and run lifecycle endpoints so operators
    can review stored state and generated reasoning evidence with the same contract
    boundary.
  contact:
    name: Bijux
    url: https://github.com/bijux/bijux-canon
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: v1
servers:
- url: /
paths:
  /health:
    get:
      tags:
      - Health
      summary: Report API health
      description: Return a lightweight liveness signal for the reasoning API.
      operationId: getReasonHealth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/items:
    get:
      tags:
      - Items
      summary: List active items
      description: Return the current page of active items. Deleted records are hidden
        from this listing and pagination is controlled with limit and offset.
      operationId: listReasonItems
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 10
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000000
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemListResponse'
        '401':
          description: Authentication failed for the requested endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '413':
          description: The request or response exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '415':
          description: The submitted content type is not accepted by the API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '429':
          description: The caller exceeded the configured rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation failed for a query parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
    post:
      tags:
      - Items
      summary: Create an item
      description: Create a new item. If the name already exists and is active, the
        runtime returns the existing record instead of creating a duplicate.
      operationId: createReasonItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '401':
          description: Authentication failed for the requested endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '413':
          description: The request or response exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '415':
          description: The submitted content type is not accepted by the API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '429':
          description: The caller exceeded the configured rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '409':
          description: The submitted name conflicts with another item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation failed for the submitted payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
  /v1/items/{item_id}:
    get:
      tags:
      - Items
      summary: Get an item
      description: Return a single active item by identifier.
      operationId: getReasonItem
      parameters:
      - name: item_id
        in: path
        required: true
        schema:
          type: integer
          maximum: 1000000
          minimum: 1
          title: Item Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '401':
          description: Authentication failed for the requested endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '413':
          description: The request or response exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '415':
          description: The submitted content type is not accepted by the API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '429':
          description: The caller exceeded the configured rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '404':
          description: The requested item does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation failed for the requested item id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
    delete:
      tags:
      - Items
      summary: Delete an item
      description: Mark an active item as deleted so it no longer appears in listings.
      operationId: deleteReasonItem
      parameters:
      - name: item_id
        in: path
        required: true
        schema:
          type: integer
          maximum: 1000000
          minimum: 1
          title: Item Id
      responses:
        '204':
          description: Successful Response
        '401':
          description: Authentication failed for the requested endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '413':
          description: The request or response exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '415':
          description: The submitted content type is not accepted by the API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '429':
          description: The caller exceeded the configured rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '404':
          description: The requested item does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation failed for the requested item id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
    put:
      tags:
      - Items
      summary: Update an item
      description: Update an active item or create the requested identifier when it
        does not yet exist.
      operationId: updateReasonItem
      parameters:
      - name: item_id
        in: path
        required: true
        schema:
          type: integer
          maximum: 1000000
          minimum: 1
          title: Item Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '401':
          description: Authentication failed for the requested endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '413':
          description: The request or response exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '415':
          description: The submitted content type is not accepted by the API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '429':
          description: The caller exceeded the configured rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '404':
          description: The requested item is deleted or unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '409':
          description: The submitted name conflicts with another item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation failed for the submitted payload or item id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
  /v1/runs:
    post:
      tags:
      - Runs
      summary: Create a run
      description: Build a deterministic run directory from the submitted problem
        spec and return the identifiers needed to inspect, verify, or replay it later.
      operationId: createReasonRun
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCreateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCreateResponse'
        '401':
          description: Authentication failed for the requested endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '413':
          description: The request or response exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '415':
          description: The submitted content type is not accepted by the API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '429':
          description: The caller exceeded the configured rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation failed for the run creation payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
  /v1/runs/{run_id}:
    get:
      tags:
      - Runs
      summary: Get run metadata
      description: Return the stored run metadata document for a previously created
        run.
      operationId: getReasonRun
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Getreasonrun
        '401':
          description: Authentication failed for the requested endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '413':
          description: The request or response exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '415':
          description: The submitted content type is not accepted by the API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '429':
          description: The caller exceeded the configured rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '404':
          description: The requested run was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/runs/{run_id}/manifest:
    get:
      tags:
      - Runs
      summary: Get run manifest
      description: Return the persisted manifest document for a previously created
        run.
      operationId: getReasonRunManifest
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Getreasonrunmanifest
        '401':
          description: Authentication failed for the requested endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '413':
          description: The request or response exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '415':
          description: The submitted content type is not accepted by the API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '429':
          description: The caller exceeded the configured rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '404':
          description: The requested manifest was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/runs/{run_id}/trace:
    get:
      tags:
      - Runs
      summary: Get run trace
      description: Return the recorded trace for a run as newline-delimited JSON.
      operationId: getReasonRunTrace
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      responses:
        '200':
          description: Successful Response
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Authentication failed for the requested endpoint.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '413':
          description: The request or response exceeded the configured size limit.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '415':
          description: The submitted content type is not accepted by the API.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '429':
          description: The caller exceeded the configured rate limit.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '404':
          description: The requested trace was not found.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/runs/{run_id}/verify:
    post:
      tags:
      - Runs
      summary: Verify a run
      description: Verify a stored run trace against its persisted plan and return
        the verification report.
      operationId: verifyReasonRun
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Verifyreasonrun
        '401':
          description: Authentication failed for the requested endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '413':
          description: The request or response exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '415':
          description: The submitted content type is not accepted by the API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '429':
          description: The caller exceeded the configured rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '404':
          description: Required run artifacts were not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/runs/{run_id}/replay:
    post:
      tags:
      - Runs
      summary: Replay a run
      description: Replay a stored run trace and report the resulting fingerprint
        comparison.
      operationId: replayReasonRun
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunReplayResponse'
        '401':
          description: Authentication failed for the requested endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '413':
          description: The request or response exceeded the configured size limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '415':
          description: The submitted content type is not accepted by the API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '429':
          description: The caller exceeded the configured rate limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '404':
          description: The requested trace was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ErrorDetail:
      properties:
        detail:
          type: string
          title: Detail
          description: Human-readable explanation for the API failure.
      type: object
      required:
      - detail
      title: ErrorDetail
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
          description: Liveness indicator returned by the API.
      type: object
      required:
      - status
      title: HealthResponse
    ItemCreate:
      properties:
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
      additionalProperties: true
      type: object
      title: ItemCreate
    ItemListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/ItemResponse'
          type: array
          title: Items
          description: Ordered page of active items returned by the API.
        total:
          type: integer
          minimum: 0.0
          title: Total
          description: Total number of active items available.
      type: object
      required:
      - items
      - total
      title: ItemListResponse
    ItemResponse:
      properties:
        id:
          type: integer
          minimum: 1.0
          title: Id
          description: Stable item identifier.
        name:
          type: string
          title: Name
          description: Reader-facing item name.
        description:
          type: string
          title: Description
          description: Free-form item description.
      type: object
      required:
      - id
      - name
      - description
      title: ItemResponse
    ItemUpdate:
      properties:
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
      additionalProperties: true
      type: object
      title: ItemUpdate
    JsonValue: {}
    ProblemSpec:
      properties:
        id:
          type: string
          title: Id
          default: ''
        description:
          type: string
          title: Description
        constraints:
          additionalProperties:
            $ref: '#/components/schemas/JsonValue'
          type: object
          title: Constraints
        expected_output_type:
          type: string
          title: Expected Output Type
          default: Claim
        expected:
          anyOf:
          - additionalProperties:
              $ref: '#/components/schemas/JsonValue'
            type: object
          - type: 'null'
          title: Expected
        version:
          anyOf:
          - type: integer
          - type: 'null'
          title: Version
      additionalProperties: false
      type: object
      required:
      - description
      title: ProblemSpec
    RunCreateRequest:
      properties:
        spec:
          $ref: '#/components/schemas/ProblemSpec'
        preset:
          type: string
          title: Preset
          default: default
        seed:
          type: integer
          minimum: 0.0
          title: Seed
          default: 0
      type: object
      required:
      - spec
      title: RunCreateRequest
    RunCreateResponse:
      properties:
        run_id:
          type: string
          title: Run Id
        run_dir:
          type: string
          title: Run Dir
        trace_id:
          type: string
          title: Trace Id
        fingerprint:
          type: string
          title: Fingerprint
      type: object
      required:
      - run_id
      - run_dir
      - trace_id
      - fingerprint
      title: RunCreateResponse
    RunReplayResponse:
      properties:
        original_trace_fingerprint:
          type: string
          title: Original Trace Fingerprint
        replayed_trace_fingerprint:
          type: string
          title: Replayed Trace Fingerprint
        diff_summary:
          additionalProperties: true
          type: object
          title: Diff Summary
        replay_trace_path:
          type: string
          title: Replay Trace Path
      type: object
      required:
      - original_trace_fingerprint
      - replayed_trace_fingerprint
      - diff_summary
      - replay_trace_path
      title: RunReplayResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
tags:
- name: Health
  description: Operational health signals for the reasoning API.
- name: Items
  description: Lightweight persisted items owned by the runtime.
- name: Runs
  description: Run creation, inspection, verification, and replay endpoints.
