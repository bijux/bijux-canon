components:
  schemas:
    ErrorDetail:
      properties:
        detail:
          description: Human-readable explanation for the API failure.
          title: Detail
          type: string
      required:
      - detail
      title: ErrorDetail
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthResponse:
      properties:
        status:
          description: Liveness indicator returned by the API.
          title: Status
          type: string
      required:
      - status
      title: HealthResponse
      type: object
    ItemCreate:
      additionalProperties: true
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
      title: ItemCreate
      type: object
    ItemListResponse:
      properties:
        items:
          description: Ordered page of active items returned by the API.
          items:
            $ref: '#/components/schemas/ItemResponse'
          title: Items
          type: array
        total:
          description: Total number of active items available.
          minimum: 0.0
          title: Total
          type: integer
      required:
      - items
      - total
      title: ItemListResponse
      type: object
    ItemResponse:
      properties:
        description:
          description: Free-form item description.
          title: Description
          type: string
        id:
          description: Stable item identifier.
          minimum: 1.0
          title: Id
          type: integer
        name:
          description: Reader-facing item name.
          title: Name
          type: string
      required:
      - id
      - name
      - description
      title: ItemResponse
      type: object
    ItemUpdate:
      additionalProperties: true
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
      title: ItemUpdate
      type: object
    ProblemSpec:
      additionalProperties: false
      properties:
        constraints:
          additionalProperties: true
          title: Constraints
          type: object
        description:
          title: Description
          type: string
        expected:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Expected
        expected_output_type:
          default: Claim
          title: Expected Output Type
          type: string
        id:
          default: ''
          title: Id
          type: string
        version:
          anyOf:
          - type: integer
          - type: 'null'
          title: Version
      required:
      - description
      title: ProblemSpec
      type: object
    RunCreateRequest:
      properties:
        preset:
          default: default
          title: Preset
          type: string
        seed:
          default: 0
          minimum: 0.0
          title: Seed
          type: integer
        spec:
          $ref: '#/components/schemas/ProblemSpec'
      required:
      - spec
      title: RunCreateRequest
      type: object
    RunCreateResponse:
      properties:
        fingerprint:
          title: Fingerprint
          type: string
        run_dir:
          title: Run Dir
          type: string
        run_id:
          title: Run Id
          type: string
        trace_id:
          title: Trace Id
          type: string
      required:
      - run_id
      - run_dir
      - trace_id
      - fingerprint
      title: RunCreateResponse
      type: object
    RunReplayResponse:
      properties:
        diff_summary:
          additionalProperties: true
          title: Diff Summary
          type: object
        original_trace_fingerprint:
          title: Original Trace Fingerprint
          type: string
        replay_trace_path:
          title: Replay Trace Path
          type: string
        replayed_trace_fingerprint:
          title: Replayed Trace Fingerprint
          type: string
      required:
      - original_trace_fingerprint
      - replayed_trace_fingerprint
      - diff_summary
      - replay_trace_path
      title: RunReplayResponse
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  contact:
    name: Bijux
    url: https://github.com/bijux/bijux-canon
  description: The bijux-canon-reason HTTP API exposes the v1 operational surface
    for managing lightweight item state and creating auditable run artifacts. It is
    intentionally split between simple CRUD and run lifecycle endpoints so operators
    can review stored state and generated reasoning evidence with the same contract
    boundary.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  summary: Deterministic item and run management for the reasoning runtime.
  title: bijux-canon-reason API
  version: v1
openapi: 3.1.0
paths:
  /health:
    get:
      description: Return a lightweight liveness signal for the reasoning API.
      operationId: getReasonHealth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Successful Response
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The health request could not be interpreted.
      summary: Report API health
      tags:
      - Health
  /v1/items:
    get:
      description: Return the current page of active items. Deleted records are hidden
        from this listing and pagination is controlled with limit and offset.
      operationId: listReasonItems
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          default: 10
          maximum: 100
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          maximum: 1000000
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemListResponse'
          description: Successful Response
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Authentication failed for the requested endpoint.
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The request or response exceeded the configured size limit.
        '415':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted content type is not accepted by the API.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Validation failed for a query parameter.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The caller exceeded the configured rate limit.
      summary: List active items
      tags:
      - Items
    post:
      description: Create a new item. If the name already exists and is active, the
        runtime returns the existing record instead of creating a duplicate.
      operationId: createReasonItem
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
          description: Successful Response
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Authentication failed for the requested endpoint.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted name conflicts with another item.
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The request or response exceeded the configured size limit.
        '415':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted content type is not accepted by the API.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Validation failed for the submitted payload.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The caller exceeded the configured rate limit.
      summary: Create an item
      tags:
      - Items
  /v1/items/{item_id}:
    delete:
      description: Mark an active item as deleted so it no longer appears in listings.
      operationId: deleteReasonItem
      parameters:
      - in: path
        name: item_id
        required: true
        schema:
          maximum: 1000000
          minimum: 1
          title: Item Id
          type: integer
      responses:
        '204':
          description: Successful Response
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Authentication failed for the requested endpoint.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The requested item does not exist.
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The request or response exceeded the configured size limit.
        '415':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted content type is not accepted by the API.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Validation failed for the requested item id.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The caller exceeded the configured rate limit.
      summary: Delete an item
      tags:
      - Items
    get:
      description: Return a single active item by identifier.
      operationId: getReasonItem
      parameters:
      - in: path
        name: item_id
        required: true
        schema:
          maximum: 1000000
          minimum: 1
          title: Item Id
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
          description: Successful Response
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Authentication failed for the requested endpoint.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The requested item does not exist.
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The request or response exceeded the configured size limit.
        '415':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted content type is not accepted by the API.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Validation failed for the requested item id.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The caller exceeded the configured rate limit.
      summary: Get an item
      tags:
      - Items
    put:
      description: Update an active item or create the requested identifier when it
        does not yet exist.
      operationId: updateReasonItem
      parameters:
      - in: path
        name: item_id
        required: true
        schema:
          maximum: 1000000
          minimum: 1
          title: Item Id
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
          description: Successful Response
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Authentication failed for the requested endpoint.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The requested item is deleted or unavailable.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted name conflicts with another item.
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The request or response exceeded the configured size limit.
        '415':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted content type is not accepted by the API.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Validation failed for the submitted payload or item id.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The caller exceeded the configured rate limit.
      summary: Update an item
      tags:
      - Items
  /v1/runs:
    post:
      description: Build a deterministic run directory from the submitted problem
        spec and return the identifiers needed to inspect, verify, or replay it later.
      operationId: createReasonRun
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCreateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCreateResponse'
          description: Successful Response
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Authentication failed for the requested endpoint.
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The request or response exceeded the configured size limit.
        '415':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted content type is not accepted by the API.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Validation failed for the run creation payload.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The caller exceeded the configured rate limit.
      summary: Create a run
      tags:
      - Runs
  /v1/runs/{run_id}:
    get:
      description: Return the stored run metadata document for a previously created
        run.
      operationId: getReasonRun
      parameters:
      - in: path
        name: run_id
        required: true
        schema:
          title: Run Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Getreasonrun
                type: object
          description: Successful Response
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Authentication failed for the requested endpoint.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The requested run was not found.
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The request or response exceeded the configured size limit.
        '415':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted content type is not accepted by the API.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The caller exceeded the configured rate limit.
      summary: Get run metadata
      tags:
      - Runs
  /v1/runs/{run_id}/manifest:
    get:
      description: Return the persisted manifest document for a previously created
        run.
      operationId: getReasonRunManifest
      parameters:
      - in: path
        name: run_id
        required: true
        schema:
          title: Run Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Getreasonrunmanifest
                type: object
          description: Successful Response
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Authentication failed for the requested endpoint.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The requested manifest was not found.
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The request or response exceeded the configured size limit.
        '415':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted content type is not accepted by the API.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The caller exceeded the configured rate limit.
      summary: Get run manifest
      tags:
      - Runs
  /v1/runs/{run_id}/replay:
    post:
      description: Replay a stored run trace and report the resulting fingerprint
        comparison.
      operationId: replayReasonRun
      parameters:
      - in: path
        name: run_id
        required: true
        schema:
          title: Run Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunReplayResponse'
          description: Successful Response
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Authentication failed for the requested endpoint.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The requested trace was not found.
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The request or response exceeded the configured size limit.
        '415':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted content type is not accepted by the API.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The caller exceeded the configured rate limit.
      summary: Replay a run
      tags:
      - Runs
  /v1/runs/{run_id}/trace:
    get:
      description: Return the recorded trace for a run as newline-delimited JSON.
      operationId: getReasonRunTrace
      parameters:
      - in: path
        name: run_id
        required: true
        schema:
          title: Run Id
          type: string
      responses:
        '200':
          content:
            text/plain:
              schema:
                type: string
          description: Successful Response
        '401':
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Authentication failed for the requested endpoint.
        '404':
          content:
            application/json:
              schema:
                properties:
                  detail:
                    description: Human-readable explanation for the API failure.
                    title: Detail
                    type: string
                required:
                - detail
                title: ErrorDetail
                type: object
          description: The requested trace was not found.
        '413':
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The request or response exceeded the configured size limit.
        '415':
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted content type is not accepted by the API.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '429':
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The caller exceeded the configured rate limit.
      summary: Get run trace
      tags:
      - Runs
  /v1/runs/{run_id}/verify:
    post:
      description: Verify a stored run trace against its persisted plan and return
        the verification report.
      operationId: verifyReasonRun
      parameters:
      - in: path
        name: run_id
        required: true
        schema:
          title: Run Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Verifyreasonrun
                type: object
          description: Successful Response
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Authentication failed for the requested endpoint.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Required run artifacts were not found.
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The request or response exceeded the configured size limit.
        '415':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The submitted content type is not accepted by the API.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: The caller exceeded the configured rate limit.
      summary: Verify a run
      tags:
      - Runs
security: []
servers:
- url: /
tags:
- description: Operational health signals for the reasoning API.
  name: Health
- description: Lightweight persisted items owned by the runtime.
  name: Items
- description: Run creation, inspection, verification, and replay endpoints.
  name: Runs
