extend = "../shared/ruff/base.toml"
fix = true
src = ["../../packages/bijux-agent/src", "../../packages/bijux-agent/tests"]

[lint]
select = [
  "E", "F", "I", "B", "UP", "SIM", "PT", "N", "A", "C4", "S", "TID", "PERF"
]
ignore = ["E501", "E203", "D203", "D213"]

[lint.per-file-ignores]
"tests/**" = ["S101", "D", "S"]
"__init__.py" = ["F401"]
"src/bijux_agent/schema/models.py" = ["PT011"]
"src/bijux_agent/models/contract.py" = ["PT011"]

[lint.isort]
force-sort-within-sections = true
known-first-party = ["bijux_agent"]
required-imports = ["from __future__ import annotations"]

[lint.pydocstyle]
convention = "google"

[lint.flake8-tidy-imports]
ban-relative-imports = "parents"

[lint.mccabe]
max-complexity = 10
