[pytest]
minversion = 8.0
addopts =
    -ra
    --strict-markers
    --cov=bijux_agent
    --cov-report=term-missing
    --cov-fail-under=0
testpaths = ../../packages/bijux-agent/tests
pythonpath = ../../packages/bijux-agent/src
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: mark a test as unit level
    integration: mark a test as integration level
    e2e: mark a test as end-to-end (real model)
    live: mark a test as a live provider integration
