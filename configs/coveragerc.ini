[run]
branch = True
parallel = False
source =
    agentic_flows
    bijux_agent
    bijux_canon_agent
    bijux_canon_dev
    bijux_canon_index
    bijux_canon_ingest
    bijux_canon_reason
    bijux_canon_runtime
    bijux_rag
    bijux_rar
    bijux_vex
data_file = artifacts/test/.coverage
omit =
    */.tox/*
    */.venv/*
    */site-packages/*
    */__all__.py
    */_pydantic_typing.py
    */__main__.py
    tests/*

[report]
show_missing = True
skip_covered = False
precision = 1

[html]
directory = artifacts/test/htmlcov
