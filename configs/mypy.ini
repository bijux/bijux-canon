[mypy]
python_version = 3.11
mypy_path = src:stubs
files = src, tests
exclude = ^(\.venv|build|dist|docs|htmlcov|\.mypy_cache|\.pytest_cache|\.ruff_cache|\.tox|__pycache__|migrations|\.egg-info|node_modules|artifacts)/
pretty = true
show_error_codes = true
warn_unused_configs = true
warn_unused_ignores = true
warn_unreachable = true
plugins = pydantic.mypy
namespace_packages = true

[mypy-cookiecutter.*]
ignore_missing_imports = true

[mypy-agentic_flows.*]
ignore_errors = true

[mypy-bijux_canon_reason.*]
ignore_errors = true

[mypy-bijux_canon_index.*]
ignore_errors = true

[mypy-tests.*]
disallow_untyped_defs = false
disallow_untyped_calls = false

[pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
warn_untyped_fields = true
