[mypy]
python_version = 3.11
strict = true
pretty = true
show_error_codes = true
warn_unreachable = true
warn_unused_configs = true
warn_unused_ignores = true
namespace_packages = true
plugins = pydantic.mypy
mypy_path = packages/bijux-canon-agent/src:packages/bijux-canon-agent/stubs:packages/bijux-canon-dev/src:packages/bijux-canon-index/src:packages/bijux-canon-index/stubs:packages/bijux-canon-ingest/src:packages/bijux-canon-ingest/stubs:packages/bijux-canon-reason/src:packages/bijux-canon-runtime/src:packages/compat-agentic-flows/src:packages/compat-bijux-agent/src:packages/compat-bijux-rag/src:packages/compat-bijux-rar/src:packages/compat-bijux-vex/src
files = packages/bijux-canon-agent/src, packages/bijux-canon-agent/tests, packages/bijux-canon-dev/src, packages/bijux-canon-dev/tests, packages/bijux-canon-index/src, packages/bijux-canon-index/tests, packages/bijux-canon-ingest/src, packages/bijux-canon-ingest/tests, packages/bijux-canon-reason/src, packages/bijux-canon-reason/tests, packages/bijux-canon-runtime/src, packages/bijux-canon-runtime/tests, packages/compat-agentic-flows/src, packages/compat-bijux-agent/src, packages/compat-bijux-rag/src, packages/compat-bijux-rar/src, packages/compat-bijux-vex/src
exclude = ^(\.venv|build|dist|docs|htmlcov|\.mypy_cache|\.pytest_cache|\.ruff_cache|\.tox|__pycache__|migrations|\.egg-info|node_modules|artifacts|site)/

[mypy-cookiecutter.*]
ignore_missing_imports = true

[mypy-bijux_canon_runtime.*]
ignore_errors = true

[mypy-bijux_canon_ingest.*]
ignore_errors = true

[mypy-bijux_canon_reason.*]
ignore_errors = true

[mypy-bijux_canon_index.*]
ignore_errors = true

[mypy-tests.*]
disallow_untyped_defs = false
disallow_untyped_calls = false

[pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
warn_untyped_fields = true
