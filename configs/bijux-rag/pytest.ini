[pytest]
minversion = 8.0
testpaths = ../../packages/bijux-rag/tests
pythonpath = ../../packages/bijux-rag/src
norecursedirs =
  .venv
  .tox
  .pytest_cache
  .ruff_cache
  .mypy_cache
  .hypothesis
  .benchmarks
  build
  dist
  docs
  artifacts

asyncio_mode = auto
timeout = 120
timeout_method = thread
timeout_func_only = true

addopts =
  -ra
  --strict-markers
  --tb=short

xfail_strict = true

markers =
  e2e: end-to-end tests
  slow: mark test as slow

filterwarnings =
  ignore:jsonschema\.exceptions\.RefResolutionError is deprecated:DeprecationWarning:schemathesis.generation.coverage
