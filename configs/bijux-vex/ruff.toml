extend = "../shared/ruff/base.toml"
src = ["../../packages/bijux-vex/src", "../../packages/bijux-vex/tests"]
extend-exclude = ["../../packages/bijux-vex/src/bijux_vex/_version.py"]

[lint.per-file-ignores]
"tests/**" = ["S101"]
"__init__.py" = ["F401"]

[lint.isort]
force-sort-within-sections = true
known-first-party = ["bijux_vex"]
required-imports = ["from __future__ import annotations"]

[lint.flake8-tidy-imports]
ban-relative-imports = "parents"

[lint.mccabe]
max-complexity = 10
