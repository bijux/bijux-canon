target-version = "py311"
line-length = 88
respect-gitignore = true
src = [
  "packages/bijux-canon-agent/src",
  "packages/bijux-canon-agent/tests",
  "packages/bijux-canon-dev/src",
  "packages/bijux-canon-dev/tests",
  "packages/bijux-canon-index/src",
  "packages/bijux-canon-index/tests",
  "packages/bijux-canon-ingest/src",
  "packages/bijux-canon-ingest/tests",
  "packages/bijux-canon-reason/src",
  "packages/bijux-canon-reason/tests",
  "packages/bijux-canon-runtime/src",
  "packages/bijux-canon-runtime/tests",
  "packages/compat-agentic-flows/src",
  "packages/compat-bijux-agent/src",
  "packages/compat-bijux-rag/src",
  "packages/compat-bijux-rar/src",
  "packages/compat-bijux-vex/src",
]
exclude = [
  ".git",
  ".hg",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".tox",
  ".venv",
  "artifacts",
  "build",
  "dist",
  "docs/report",
  "htmlcov",
  "__pycache__",
  "migrations",
  "node_modules",
  "*.egg-info",
  "site",
]
extend-exclude = ["src/**/_version.py"]

[lint]
select = ["E", "F", "I", "B", "UP", "SIM", "C4", "PIE", "RET", "ISC"]
ignore = ["E501", "E203"]

[lint.per-file-ignores]
"__init__.py" = ["F401"]

[lint.isort]
force-sort-within-sections = true

[lint.mccabe]
max-complexity = 10
