extend = "shared/ruff/base.toml"
src = ["src", "tests"]
extend-exclude = ["artifacts", "node_modules", "src/**/_version.py"]

[lint.per-file-ignores]
"tests/**" = ["S101"]
"__init__.py" = ["F401"]
"src/bijux_agent/schema/models.py" = ["PT011"]
"src/bijux_agent/models/contract.py" = ["PT011"]

[lint.isort]
force-sort-within-sections = true
required-imports = ["from __future__ import annotations"]

[lint.flake8-tidy-imports]
ban-relative-imports = "parents"

[lint.mccabe]
max-complexity = 10
