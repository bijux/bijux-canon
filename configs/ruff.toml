target-version = "py311"
line-length = 88
respect-gitignore = true
src = [
  "packages/bijux-canon-agent/src",
  "packages/bijux-canon-agent/tests",
  "packages/bijux-canon-dev/src",
  "packages/bijux-canon-dev/tests",
  "packages/bijux-canon-index/src",
  "packages/bijux-canon-index/tests",
  "packages/bijux-canon-ingest/src",
  "packages/bijux-canon-ingest/tests",
  "packages/bijux-canon-reason/src",
  "packages/bijux-canon-reason/tests",
  "packages/bijux-canon-runtime/src",
  "packages/bijux-canon-runtime/tests",
  "packages/compat-agentic-flows/src",
  "packages/compat-bijux-agent/src",
  "packages/compat-bijux-rag/src",
  "packages/compat-bijux-rar/src",
  "packages/compat-bijux-vex/src",
]
exclude = [
  ".git",
  ".hg",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".tox",
  ".venv",
  "artifacts",
  "build",
  "dist",
  "docs/report",
  "htmlcov",
  "__pycache__",
  "migrations",
  "node_modules",
  "*.egg-info",
  "site",
]
extend-exclude = ["src/**/_version.py"]

[lint]
select = ["E", "F", "I", "B", "UP", "SIM", "C4", "PERF"]
ignore = ["E501", "E203"]

[lint.per-file-ignores]
"packages/*/tests/**" = ["S101"]
"__init__.py" = ["F401"]
"src/bijux_canon_agent/schema/models.py" = ["PT011"]
"src/bijux_canon_agent/models/contract.py" = ["PT011"]
"**/src/bijux_canon_dev/quality/deptry_scan.py" = ["S603"]
"**/src/bijux_canon_dev/packages/agent/check_no_generated_files.py" = ["S603"]
"**/src/bijux_canon_dev/packages/agent/check_no_stray_dirs.py" = ["S603"]
"**/src/bijux_canon_dev/packages/runtime/check_dependency_allowlist.py" = ["S603"]
"**/src/bijux_canon_dev/release/version_resolver.py" = ["S603"]
"**/tests/test_release_history.py" = ["S603", "S607"]
"**/tests/test_release_publication.py" = ["S603"]

[lint.isort]
force-sort-within-sections = true

[lint.mccabe]
max-complexity = 10
