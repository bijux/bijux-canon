target-version = "py311"
line-length = 88
respect-gitignore = true
cache-dir = "artifacts/root/ruff-cache"
src = [
  "packages/bijux-canon-agent/src",
  "packages/bijux-canon-agent/tests",
  "packages/bijux-canon-dev/src",
  "packages/bijux-canon-dev/tests",
  "packages/bijux-canon-index/src",
  "packages/bijux-canon-index/tests",
  "packages/bijux-canon-ingest/src",
  "packages/bijux-canon-ingest/tests",
  "packages/bijux-canon-reason/src",
  "packages/bijux-canon-reason/tests",
  "packages/bijux-canon-runtime/src",
  "packages/bijux-canon-runtime/tests",
  "packages/compat-bijux-canon/src",
  "packages/compat-bijux-canon/tests",
  "packages/compat-agentic-flows/src",
  "packages/compat-agentic-flows/tests",
  "packages/compat-bijux-agent/src",
  "packages/compat-bijux-agent/tests",
  "packages/compat-bijux-rag/src",
  "packages/compat-bijux-rag/tests",
  "packages/compat-bijux-rar/src",
  "packages/compat-bijux-rar/tests",
  "packages/compat-bijux-vex/src",
  "packages/compat-bijux-vex/tests",
]
exclude = [
  ".git",
  ".hg",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".tox",
  ".venv",
  "artifacts",
  "build",
  "dist",
  "docs/report",
  "htmlcov",
  "__pycache__",
  "migrations",
  "node_modules",
  "*.egg-info",
  "site",
]
extend-exclude = ["src/**/_version.py"]

[lint]
select = ["E", "F", "I", "B", "UP", "SIM", "C4", "PIE", "RET", "ISC"]
ignore = ["E501", "E203"]

[lint.per-file-ignores]
"__init__.py" = ["F401"]

[lint.isort]
force-sort-within-sections = true
known-first-party = [
  "agentic_flows",
  "bijux_agent",
  "bijux_canon",
  "bijux_canon_agent",
  "bijux_canon_dev",
  "bijux_canon_index",
  "bijux_canon_ingest",
  "bijux_canon_reason",
  "bijux_canon_runtime",
  "bijux_rag",
  "bijux_rar",
  "bijux_vex",
  "tests",
]

[lint.mccabe]
max-complexity = 10
