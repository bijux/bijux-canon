[pytest]
addopts = -ra --strict-markers --maxfail=1
testpaths = ../../packages/bijux-rar/tests
markers =
    e2e: end-to-end tests
    slow: slow tests
pythonpath =
    ../../packages/bijux-rar/src
    ../../packages/bijux-rar
filterwarnings =
    ignore:'HTTP_422_UNPROCESSABLE_ENTITY' is deprecated:DeprecationWarning:anyio._backends._asyncio
