[build-system]
requires = ["hatchling>=1.27.0,<1.28", "hatch-vcs>=0.4.0,<1.0"]
build-backend = "hatchling.build"

[project]
name = "bijux-vex"
dynamic = ["version", "dependencies"]
description = "Compatibility package for bijux-llm-vex."
readme = "overview.md"
requires-python = ">=3.11,<4"
license = { text = "MIT" }
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
classifiers = [
  "Development Status :: 4 - Beta",
  "License :: OSI Approved :: MIT License",
  "Intended Audience :: Developers",
  "Natural Language :: English",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Typing :: Typed",
  "Operating System :: OS Independent",
  "Topic :: Software Development :: Libraries",
  "Topic :: Security",
]

[project.urls]
"Homepage" = "https://github.com/bijux/bijux-llm-nexus/tree/main/packages/bijux-llm-vex"
"Repository" = "https://github.com/bijux/bijux-llm-nexus"
"Bug Tracker" = "https://github.com/bijux/bijux-llm-nexus/issues"
"Documentation" = "https://bijux.github.io/bijux-vex/"
"Changelog" = "https://github.com/bijux/bijux-llm-nexus/blob/main/packages/bijux-llm-vex/CHANGELOG.md"
"Security" = "https://github.com/bijux/bijux-llm-nexus/blob/main/SECURITY.md"
"Funding" = "https://github.com/sponsors/bijux"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^bijux-llm-vex/v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'bijux-llm-vex/v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.1.0"

[tool.hatch.metadata.hooks.custom]
canonical-name = "bijux-llm-vex"

[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.build.targets.sdist]
include = ["pyproject.toml", "overview.md", "hatch_build.py"]
