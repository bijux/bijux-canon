[build-system]
requires = ["hatchling>=1.27.0,<1.28", "hatch-vcs>=0.4.0,<1.0"]
build-backend = "hatchling.build"

[project]
name = "bijux-vex"
dynamic = ["version", "dependencies"]
description = "Compatibility package for bijux-canon-index."
readme = "README.md"
requires-python = ">=3.11,<4"
license = { text = "Apache-2.0" }
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
classifiers = [
  "Development Status :: 4 - Beta",
  "License :: OSI Approved :: Apache Software License",
  "Intended Audience :: Developers",
  "Natural Language :: English",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Typing :: Typed",
  "Operating System :: OS Independent",
  "Topic :: Software Development :: Libraries",
  "Topic :: Security",
]

[project.urls]
"Homepage" = "https://github.com/bijux/bijux-canon/tree/main/packages/bijux-canon-index"
"Repository" = "https://github.com/bijux/bijux-canon"
"Bug Tracker" = "https://github.com/bijux/bijux-canon/issues"
"Documentation" = "https://bijux.github.io/bijux-canon-index/"
"Changelog" = "https://github.com/bijux/bijux-canon/blob/main/packages/bijux-canon-index/CHANGELOG.md"
"Security" = "https://github.com/bijux/bijux-canon/blob/main/SECURITY.md"
"Funding" = "https://github.com/sponsors/bijux"

[project.scripts]
bijux-vex = "bijux_canon_index.interfaces.cli.app:app"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^bijux-canon-index/v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'bijux-canon-index/v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.3.0"

[tool.hatch.metadata.hooks.custom]
canonical-name = "bijux-canon-index"

[tool.hatch.build.targets.wheel]
packages = ["src/bijux_vex"]

[tool.hatch.build.targets.sdist]
include = ["pyproject.toml", "README.md", "overview.md", "hatch_build.py", "src/bijux_vex/**"]
