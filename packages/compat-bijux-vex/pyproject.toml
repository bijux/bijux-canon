[build-system]
requires = ["hatchling>=1.27.0,<1.28", "hatch-vcs>=0.4.0,<1.0"]
build-backend = "hatchling.build"

[project]
name = "bijux-vex"
dynamic = ["version", "dependencies"]
description = "Compatibility bridge for the legacy bijux-vex PyPI package. Preserves installs, imports, and the bijux-vex command while installing bijux-canon-index from the bijux-canon family at the same version."
readme = "README.md"
requires-python = ">=3.11,<4"
license = { text = "Apache-2.0" }
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
maintainers = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
keywords = [
  "bijux",
  "bijux-canon",
  "bijux.io",
  "compatibility",
  "migration",
  "legacy-name",
  "vector-search",
  "ann",
  "index",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "License :: OSI Approved :: Apache Software License",
  "Intended Audience :: Developers",
  "Natural Language :: English",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Typing :: Typed",
  "Operating System :: OS Independent",
  "Topic :: Software Development :: Libraries",
  "Topic :: Security",
]

[project.urls]
"Homepage" = "https://bijux.io/bijux-canon/compat-packages/catalog/bijux-vex/"
"Website" = "https://bijux.io/"
"Repository" = "https://github.com/bijux/bijux-canon"
"Issues" = "https://github.com/bijux/bijux-canon/issues"
"Documentation" = "https://bijux.io/bijux-canon/compat-packages/catalog/bijux-vex/"
"Changelog" = "https://github.com/bijux/bijux-canon/blob/main/packages/compat-bijux-vex/CHANGELOG.md"
"Security" = "https://github.com/bijux/bijux-canon/blob/main/SECURITY.md"
"Funding" = "https://github.com/sponsors/bijux"
"MigrationGuide" = "https://bijux.io/bijux-canon/compat-packages/migration/migration-guidance/"
"LegacyNameMap" = "https://bijux.io/bijux-canon/compat-packages/catalog/legacy-name-map/"

[project.scripts]
bijux-vex = "bijux_canon_index.interfaces.cli.app:app"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.3.0"

[tool.hatch.metadata.hooks.custom]
canonical-name = "bijux-canon-index"

[tool.hatch.build]
ignore-vcs = true
include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "docs/maintainer/pypi.md", "hatch_build.py", "src/bijux_vex/**"]
exclude = [".gitignore", "/.gitignore", "**/.gitignore"]
force-include = { "../../LICENSE" = "LICENSE" }

[tool.hatch.build.targets.wheel]
packages = ["src/bijux_vex"]
include = ["src/bijux_vex/py.typed"]

[tool.hatch.build.targets.wheel.package-data]
"bijux_vex" = ["py.typed"]

[tool.hatch.build.targets.sdist]
include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "docs/maintainer/pypi.md", "hatch_build.py", "src/bijux_vex/**"]
only-include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "docs/maintainer/pypi.md", "hatch_build.py", "src/bijux_vex"]
exclude = [".gitignore", "/.gitignore", "**/.gitignore"]
