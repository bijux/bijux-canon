[build-system]
requires = ["hatchling>=1.25.0", "hatch-vcs>=0.4.0,<1.0"]
build-backend = "hatchling.build"

[project]
name = "bijux-agent"
dynamic = ["version", "dependencies"]
description = "Compatibility bridge for the legacy bijux-agent PyPI package. Preserves installs, imports, and the bijux-agent command while installing bijux-canon-agent from the bijux-canon family at the same version."
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
maintainers = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
readme = "README.md"
requires-python = ">=3.11,<4"
license = { text = "Apache-2.0" }
keywords = [
    "bijux",
    "bijux-canon",
    "bijux.io",
    "compatibility",
    "migration",
    "legacy-name",
    "agent",
    "workflow",
    "llm",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
    "License :: OSI Approved :: Apache Software License",
    "Natural Language :: English",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "Development Status :: 4 - Beta",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Text Processing :: General",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://bijux.io/bijux-canon/bijux-canon-agent/"
Website = "https://bijux.io/"
Repository = "https://github.com/bijux/bijux-canon"
Documentation = "https://bijux.io/bijux-canon/bijux-canon-agent/"
Issues = "https://github.com/bijux/bijux-canon/issues"
Changelog = "https://github.com/bijux/bijux-canon/blob/main/packages/compat-bijux-agent/CHANGELOG.md"
Security = "https://github.com/bijux/bijux-canon/blob/main/SECURITY.md"
Funding = "https://github.com/sponsors/bijux"
MigrationGuide = "https://bijux.io/bijux-canon/compat-packages/migration-guidance/"
LegacyNameMap = "https://bijux.io/bijux-canon/compat-packages/legacy-name-map/"

[project.scripts]
bijux-agent = "bijux_canon_agent.interfaces.cli.entrypoint:cli"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^bijux-canon-agent/v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'bijux-canon-agent/v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.3.0"

[tool.hatch.metadata.hooks.custom]
canonical-name = "bijux-canon-agent"

[tool.hatch.build.targets.wheel]
packages = ["src/bijux_agent"]
include = ["src/bijux_agent/py.typed"]

[tool.hatch.build.targets.wheel.package-data]
"bijux_agent" = ["py.typed"]

[tool.hatch.build.targets.sdist]
include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "docs/maintainer/pypi.md", "hatch_build.py", "src/bijux_agent/**"]
