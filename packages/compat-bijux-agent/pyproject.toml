[build-system]
requires = ["hatchling>=1.25.0", "hatch-vcs>=0.4.0,<1.0"]
build-backend = "hatchling.build"

[project]
name = "bijux-agent"
dynamic = ["version", "dependencies"]
description = "Compatibility package for bijux-llm-agent."
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
readme = "overview.md"
requires-python = ">=3.11,<4"
license = { text = "MIT" }
keywords = ["pipeline", "multi-agent", "file-processing", "summarization", "AI", "LLM"]
classifiers = [
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
    "License :: OSI Approved :: MIT License",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "Development Status :: 4 - Beta",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Text Processing :: General"
]

[project.urls]
Homepage = "https://github.com/bijux/bijux-llm-nexus/tree/main/packages/bijux-llm-agent"
Repository = "https://github.com/bijux/bijux-llm-nexus"
Documentation = "https://bijux.github.io/bijux-agent/"
Issues = "https://github.com/bijux/bijux-llm-nexus/issues"
Changelog = "https://github.com/bijux/bijux-llm-nexus/blob/main/packages/bijux-llm-agent/docs/maintainer/CHANGELOG.md"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^bijux-llm-agent/v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'bijux-llm-agent/v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.3.0"

[tool.hatch.metadata.hooks.custom]
canonical-name = "bijux-llm-agent"

[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.build.targets.sdist]
include = ["pyproject.toml", "overview.md", "hatch_build.py"]
