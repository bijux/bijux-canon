[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "bijux-agent"
version = "0.1.0"
dynamic = ["dependencies"]
description = "Compatibility package for bijux-llm-agent."
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
readme = "README.md"
requires-python = ">=3.11,<4"
license = { text = "MIT" }
keywords = ["pipeline", "multi-agent", "file-processing", "summarization", "AI", "LLM"]
classifiers = [
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
    "License :: OSI Approved :: MIT License",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "Development Status :: 4 - Beta",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Text Processing :: General"
]

[project.urls]
Homepage = "https://github.com/bijux/bijux-llm-nexus/tree/main/packages/bijux-agent"
Repository = "https://github.com/bijux/bijux-llm-nexus"
Documentation = "https://bijux.github.io/bijux-agent/"
Issues = "https://github.com/bijux/bijux-llm-nexus/issues"
Changelog = "https://github.com/bijux/bijux-llm-nexus/blob/main/packages/bijux-agent/docs/maintainer/CHANGELOG.md"

[tool.hatch.metadata.hooks.custom]
canonical-name = "bijux-llm-agent"

[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.build.targets.sdist]
include = ["pyproject.toml", "README.md", "hatch_build.py"]
