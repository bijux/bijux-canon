[build-system]
requires = ["hatchling>=1.27,<1.28", "hatch-vcs>=0.4,<1.0"]
build-backend = "hatchling.build"

[project]
name = "bijux-rag"
dynamic = ["version", "dependencies"]
description = "Compatibility package for bijux-canon-ingest."
readme = "overview.md"
requires-python = ">=3.11,<4.0"
license = { text = "MIT" }
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "License :: OSI Approved :: MIT License",
  "Topic :: Scientific/Engineering :: Information Analysis",
  "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/bijux/bijux-canon/tree/main/packages/bijux-canon-ingest"
Repository = "https://github.com/bijux/bijux-canon"
Documentation = "https://bijux.github.io/bijux-canon-ingest/"
BugTracker = "https://github.com/bijux/bijux-canon/issues"
Changelog = "https://github.com/bijux/bijux-canon/blob/main/packages/bijux-canon-ingest/CHANGELOG.md"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^bijux-canon-ingest/v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'bijux-canon-ingest/v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.3.0"

[tool.hatch.metadata.hooks.custom]
canonical-name = "bijux-canon-ingest"

[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.build.targets.sdist]
include = ["pyproject.toml", "overview.md", "hatch_build.py"]
