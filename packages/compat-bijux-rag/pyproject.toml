[build-system]
requires = ["hatchling>=1.27,<1.28", "hatch-vcs>=0.4,<1.0"]
build-backend = "hatchling.build"

[project]
name = "bijux-rag"
dynamic = ["version", "dependencies"]
description = "Compatibility bridge for the legacy bijux-rag PyPI package. Preserves installs, imports, and the bijux-rag command while installing bijux-canon-ingest from the bijux-canon family at the same version."
readme = "README.md"
requires-python = ">=3.11,<4.0"
license = { text = "Apache-2.0" }
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
maintainers = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
keywords = [
  "bijux",
  "bijux-canon",
  "bijux.io",
  "compatibility",
  "migration",
  "legacy-name",
  "rag",
  "retrieval",
  "ingest",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Natural Language :: English",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "License :: OSI Approved :: Apache Software License",
  "Topic :: Scientific/Engineering :: Information Analysis",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]

[project.urls]
Homepage = "https://bijux.io/bijux-canon-ingest/"
Website = "https://bijux.io/"
Repository = "https://github.com/bijux/bijux-canon"
Documentation = "https://bijux.io/bijux-canon-ingest/"
Issues = "https://github.com/bijux/bijux-canon/issues"
Changelog = "https://github.com/bijux/bijux-canon/blob/main/packages/compat-bijux-rag/CHANGELOG.md"
Security = "https://github.com/bijux/bijux-canon/blob/main/SECURITY.md"
Funding = "https://github.com/sponsors/bijux"
MigrationGuide = "https://bijux.io/bijux-canon/compat-packages/migration-guidance/"
LegacyNameMap = "https://bijux.io/bijux-canon/compat-packages/legacy-name-map/"

[project.scripts]
bijux-rag = "bijux_canon_ingest.interfaces.cli.entrypoint:main"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^bijux-canon-ingest/v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'bijux-canon-ingest/v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.3.0"

[tool.hatch.metadata.hooks.custom]
canonical-name = "bijux-canon-ingest"

[tool.hatch.build.targets.wheel]
packages = ["src/bijux_rag"]
include = ["src/bijux_rag/py.typed"]

[tool.hatch.build.targets.wheel.package-data]
"bijux_rag" = ["py.typed"]

[tool.hatch.build.targets.sdist]
include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "docs/maintainer/pypi.md", "hatch_build.py", "src/bijux_rag/**"]
