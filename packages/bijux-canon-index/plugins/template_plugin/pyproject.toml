[project]
name = "bijux-canon-index-template-plugin"
version = "0.0.0"
description = "Template plugin for bijux-canon-index"
requires-python = ">=3.10"
dependencies = ["bijux-canon-index"]

[project.entry-points."bijux_canon_index.vectorstores"]
template = "bijux_canon_index_plugin_example:register"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
