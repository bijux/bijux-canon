[project]
name = "bijux-canon-index-qdrant-plugin"
version = "0.0.0"
description = "Example remote vector store plugin for bijux-canon-index"
requires-python = ">=3.10"
dependencies = [
  "bijux-canon-index",
  "qdrant-client>=1.9.0",
]

[project.entry-points."bijux_canon_index.vectorstores"]
qdrant_plugin_example = "bijux_canon_index_qdrant_plugin:register"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
