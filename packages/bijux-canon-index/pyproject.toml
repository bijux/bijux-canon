[build-system]
requires = [
  "hatchling>=1.27.0,<1.28",
  "hatch-fancy-pypi-readme>=24.2,<26.0",
  "hatch-vcs>=0.4.0,<1.0",
]
build-backend = "hatchling.build"

[project]
name = "bijux-canon-index"
description = "Deterministic vector execution, replayable ANN, and provenance-aware indexing for the bijux-canon package family from Bijux."
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.11,<4"
license = { text = "Apache-2.0" }
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
maintainers = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
keywords = [
  "ann",
  "audit",
  "bijux",
  "bijux-canon",
  "bijux.io",
  "determinism",
  "execution",
  "nearest-neighbor",
  "provenance",
  "replay",
  "reproducibility",
  "vector",
  "vector-search",
  "contract-driven",
  "index",
]
dynamic = ["version"]
classifiers = [
  "Development Status :: 4 - Beta",
  "License :: OSI Approved :: Apache Software License",
  "Intended Audience :: Developers",
  "Natural Language :: English",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Typing :: Typed",
  "Operating System :: OS Independent",
  "Topic :: Software Development :: Libraries",
  "Topic :: Security",
]

dependencies = [
  "pydantic>=2.12,<3.0",
  "typer>=0.21,<0.22",
  "fastapi>=0.128,<0.137",
]

[project.optional-dependencies]
api = [
  "fastapi>=0.128,<0.137",
  "uvicorn>=0.30.1,<1.0",
  "schemathesis>=4.0,<5.0",
]
config = [
  "PyYAML>=6.0,<7.0",
]
embeddings = [
  "sentence-transformers>=2.7.0,<3.0",
]
nd = [
  "hnswlib>=0.8.0,<1.0",
]
vdb = [
  "faiss-cpu>=1.7.4,<2.0",
  "numpy>=1.26,<3.0",
  "qdrant-client>=1.9.0,<2.0",
]
docs = [
  "mkdocs>=1.6.1,<2.0",
  "mkdocs-material>=9.5.39,<10.0",
  "mkdocstrings[python]>=0.26.1,<2.0",
  "mkdocs-git-revision-date-localized-plugin>=1.2.0,<2.0",
  "mkdocs-include-markdown-plugin",
  "mkdocs-gen-files",
  "mkdocs-literate-nav",
  "mkdocs-redirects>=1.2,<2.0",
  "mkdocs-minify-plugin>=0.7,<1.0",
  "mkdocs-glightbox>=0.3,<1.0",
  "mkdocs-material[imaging]>=9.5.39,<10.0",
]
dev = [
  "types-PyYAML>=6.0.12,<7.0",
  "types-orjson>=3.6.0,<4.0",
  "types-colorama>=0.0.14,<1.0",
  "types-psutil>=6.0.0,<8.0",
  "typing-extensions>=4.5.0,<5.0",
  "types-pexpect>=4.9.0,<5.0",

  "pytest>=9.0.3,<10.0",
  "pytest-cov>=6.2.1,<7.0",
  "pytest-asyncio>=1.0.0,<2.0",
  "pytest-timeout>=2.4.0,<3.0",
  "pytest-rerunfailures>=13.0,<17.0",
  "pytest-benchmark>=4.0.0,<5.0",
  "hypothesis>=6.103.0,<7.0",
  "hypothesis-jsonschema>=0.23.0,<1.0",
  "pexpect>=4.8.0,<5.0",

  "ruff>=0.6.8,<1.0",
  "mypy>=1.11.2,<2.0",
  "codespell>=2.3.0,<3.0",
  "pydocstyle>=6.2.1,<7.0",
  "radon>=6.0.0",

  "vulture>=2.7,<3.0",
  "deptry>=0.10.0,<1.0",
  "interrogate>=1.7.0,<2.0",

  "build>=1.0.3,<2.0",
  "bandit>=1.7.10,<2.0",
  "pip-audit>=2.7.3,<3.0",
  "commitizen>=4.0.0,<5.0",

  "prance>=25.4.0.0",
  "openapi-spec-validator>=0.7.1,<1.0",
  "schemathesis>=4.0,<5.0",
  "anyio>=4.4.0,<5.0",
  "uvicorn>=0.30.1,<1.0",

  "twine>=6.1.0,<7.0",

  "cyclonedx-bom>=4.6.0",
]

[project.urls]
"Homepage" = "https://bijux.io/bijux-canon/bijux-canon-index/"
"Website" = "https://bijux.io/"
"Repository" = "https://github.com/bijux/bijux-canon"
"Issues" = "https://github.com/bijux/bijux-canon/issues"
"Documentation" = "https://bijux.io/bijux-canon/bijux-canon-index/"
"Changelog" = "https://github.com/bijux/bijux-canon/blob/main/packages/bijux-canon-index/CHANGELOG.md"
"Security" = "https://github.com/bijux/bijux-canon/blob/main/SECURITY.md"
"Funding" = "https://github.com/sponsors/bijux"
"PackageMap" = "https://bijux.io/bijux-canon/bijux-canon/foundation/package-map/"
"CompatibilityGuide" = "https://bijux.io/bijux-canon/compat-packages/migration/migration-guidance/"

[tool.hatch.version]
source = "vcs"
fallback-version = "0.3.4"
tag-pattern = "^v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }

[tool.hatch.build.hooks.vcs]
version-file = "src/bijux_canon_index/_build_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/bijux_canon_index"]
include = ["src/bijux_canon_index/py.typed"]

[tool.hatch.build.targets.sdist]
include = [
  "README.md",
  "CHANGELOG.md",
  "docs/maintainer/pypi.md",
  "src/bijux_canon_index/**",
]

[tool.hatch.build]
include = [
  "README.md",
  "CHANGELOG.md",
  "docs/maintainer/pypi.md",
  "src/bijux_canon_index/**",
]
force-include = { "LICENSE" = "LICENSE", "NOTICE" = "NOTICE" }

[tool.hatch.metadata.hooks.fancy-pypi-readme]
content-type = "text/markdown"
fragments = [
  { path = "README.md" },
  { path = "CHANGELOG.md" },
]
