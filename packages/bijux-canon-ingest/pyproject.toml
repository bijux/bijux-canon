[build-system]
requires = ["hatchling>=1.27", "hatch-vcs>=0.4"]
build-backend = "hatchling.build"

[project]
name = "bijux-canon-ingest"
dynamic = ["version"]
description = "Deterministic document ingestion, indexing, and retrieval toolkit"
readme = "README.md"
requires-python = ">=3.11,<4.0"
license = { text = "Apache-2.0" }
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "License :: OSI Approved :: Apache Software License",
  "Topic :: Scientific/Engineering :: Information Analysis",
  "Typing :: Typed",
]
dependencies = [
  "pydantic>=2.7,<3",
  "msgpack>=1.0,<2",
  "numpy>=1.26,<3",
  "fastapi>=0.115,<1.0",
  "uvicorn>=0.32,<1.0",
  "PyYAML>=6,<7",
]

[project.optional-dependencies]
docs = [
  "mkdocs>=1.6,<2",
  "mkdocs-material>=9.5,<10",
  "mkdocs-minify-plugin>=0.8,<1",
  "mkdocs-redirects>=1.2,<2",
  "mkdocs-git-revision-date-localized-plugin>=1.2,<2",
  "pymdown-extensions>=10.8,<11",
  "mkdocstrings[python]>=0.29,<1",
  "mkdocs-gen-files>=0.5,<1",
  "mkdocs-literate-nav>=0.6,<1",
  "mkdocs-section-index>=0.3,<1",
  "mkdocs-click>=0.8,<1",
  "mkdocs-glightbox>=0.4.0",
]
dev = [
  "pytest>=8.3,<9",
  "pytest-cov>=6.0,<7.0",
  "pytest-asyncio>=0.23,<1.0",
  "pytest-timeout>=2.3,<3.0",
  "hypothesis>=6.91,<7.0",
  "schemathesis>=3.29,<4.0",
  "ruff>=0.6.9,<1.0",
  "mypy>=1.11,<2.0",
  "vulture>=2.7,<3.0",
  "deptry>=0.10.0,<1.0",
  "interrogate>=1.7.0,<2.0",
  "bandit>=1.7.10,<2.0",
  "pip-audit>=2.7.3,<3.0",
  "twine>=6.1.0,<7.0",
  "prance>=25.4.0.0",
  "openapi-spec-validator>=0.7.1,<1.0",
  "types-PyYAML>=6.0.12,<7.0",
  "build>=1.2,<2.0",
  "mkdocs>=1.6,<2",
  "mkdocs-material>=9.5,<10",
  "pymdown-extensions>=10.8,<11",
  "mkdocs-git-revision-date-localized-plugin>=1.2,<2",
  "mkdocs-minify-plugin>=0.8,<1",
  "mkdocs-redirects>=1.2,<2",
  "mkdocs-glightbox>=0.4.0",
  "mkdocs-include-markdown-plugin",
  "mkdocstrings[python]>=0.29,<1",
  "mkdocs-gen-files>=0.5,<1",
  "mkdocs-literate-nav>=0.6,<1",
  "mkdocs-section-index>=0.3,<1",
  "mkdocs-click>=0.8,<1",
]

[project.scripts]
bijux-canon-ingest = "bijux_canon_ingest.interfaces.cli.entrypoint:main"

[project.urls]
Homepage = "https://github.com/bijux/bijux-canon/tree/main/packages/bijux-canon-ingest"
Repository = "https://github.com/bijux/bijux-canon"
Documentation = "https://bijux.github.io/bijux-canon-ingest/"
BugTracker = "https://github.com/bijux/bijux-canon/issues"
Changelog = "https://github.com/bijux/bijux-canon/blob/main/packages/bijux-canon-ingest/CHANGELOG.md"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^bijux-canon-ingest/v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'bijux-canon-ingest/v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.3.0"

[tool.hatch.build.hooks.vcs]
version-file = "src/bijux_canon_ingest/_version.py"

[tool.interrogate]
fail-under = 0
verbose = 0
ignore-init-method = true
ignore-private = true
ignore-semiprivate = true

[tool.pytest.ini_options]
markers = [
  "e2e: end-to-end coverage for package boundaries and retrieval contracts",
]
testpaths = ["tests"]

[tool.hatch.build]
include = [
  "src/bijux_canon_ingest/**",
  "README.md",
  "pyproject.toml",
]

[tool.hatch.build.targets.wheel]
packages = ["src/bijux_canon_ingest"]
include = ["src/bijux_canon_ingest/py.typed"]
only-include = ["src/bijux_canon_ingest"]

[tool.hatch.build.targets.wheel.package-data]
"bijux_canon_ingest" = ["py.typed"]
