[build-system]
requires = ["hatchling>=1.24.2", "hatch-vcs>=0.4.0,<1.0"]
build-backend = "hatchling.build"

[project]
name = "bijux-rar"
dynamic = ["version", "dependencies"]
description = "Legacy continuation of the bijux-rar PyPI package. Preserves legacy installs and imports while installing bijux-canon-reason at the same version."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
maintainers = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
keywords = [
  "bijux",
  "compatibility",
  "migration",
  "legacy-name",
  "reasoning",
  "verification",
  "provenance",
]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Intended Audience :: Developers",
  "Natural Language :: English",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries",
  "Topic :: Security",
  "Typing :: Typed",
]

[project.urls]
Homepage = "https://bijux.io/"
Website = "https://bijux.io/"
Repository = "https://github.com/bijux/bijux-canon"
Documentation = "https://bijux.io/bijux-canon-reason/"
Issues = "https://github.com/bijux/bijux-canon/issues"
Changelog = "https://github.com/bijux/bijux-canon/blob/main/packages/compat-bijux-rar/CHANGELOG.md"
Security = "https://github.com/bijux/bijux-canon/blob/main/SECURITY.md"
Funding = "https://github.com/sponsors/bijux"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^bijux-canon-reason/v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'bijux-canon-reason/v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.3.0"

[tool.hatch.metadata.hooks.custom]
canonical-name = "bijux-canon-reason"

[tool.hatch.build.targets.wheel]
packages = ["src/bijux_rar"]
include = ["src/bijux_rar/py.typed"]

[tool.hatch.build.targets.wheel.package-data]
"bijux_rar" = ["py.typed"]

[tool.hatch.build.targets.sdist]
include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "hatch_build.py", "src/bijux_rar/**"]
