[build-system]
requires = ["hatchling>=1.24.2", "hatch-vcs>=0.4.0,<1.0"]
build-backend = "hatchling.build"

[project]
name = "bijux-rar"
dynamic = ["version", "dependencies"]
description = "Compatibility bridge for the legacy bijux-rar PyPI package. Preserves installs, imports, and the bijux-rar command while installing bijux-canon-reason from the bijux-canon family at the same version."
readme = "README.md"
requires-python = ">=3.11,<4"
license = { text = "Apache-2.0" }
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
maintainers = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
keywords = [
  "bijux",
  "bijux-canon",
  "bijux.io",
  "compatibility",
  "migration",
  "legacy-name",
  "reasoning",
  "verification",
  "provenance",
]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Intended Audience :: Developers",
  "Natural Language :: English",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Software Development :: Libraries",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Security",
  "Typing :: Typed",
]

[project.urls]
Homepage = "https://bijux.io/bijux-canon/compat-packages/catalog/bijux-rar/"
Website = "https://bijux.io/"
Repository = "https://github.com/bijux/bijux-canon"
Documentation = "https://bijux.io/bijux-canon/compat-packages/catalog/bijux-rar/"
Issues = "https://github.com/bijux/bijux-canon/issues"
Changelog = "https://github.com/bijux/bijux-canon/blob/main/packages/compat-bijux-rar/CHANGELOG.md"
Security = "https://github.com/bijux/bijux-canon/blob/main/SECURITY.md"
Funding = "https://github.com/sponsors/bijux"
MigrationGuide = "https://bijux.io/bijux-canon/compat-packages/migration/migration-guidance/"
LegacyNameMap = "https://bijux.io/bijux-canon/compat-packages/catalog/legacy-name-map/"

[project.scripts]
bijux-rar = "bijux_canon_reason.interfaces.cli:app"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.3.0"

[tool.hatch.metadata.hooks.custom]
canonical-name = "bijux-canon-reason"

[tool.hatch.build]
ignore-vcs = true
include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "docs/maintainer/pypi.md", "hatch_build.py", "src/bijux_rar/**"]
exclude = [".gitignore", "/.gitignore", "**/.gitignore"]
force-include = { "../../LICENSE" = "LICENSE" }

[tool.hatch.build.targets.wheel]
packages = ["src/bijux_rar"]
include = ["src/bijux_rar/py.typed"]

[tool.hatch.build.targets.wheel.package-data]
"bijux_rar" = ["py.typed"]

[tool.hatch.build.targets.sdist]
include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "docs/maintainer/pypi.md", "hatch_build.py", "src/bijux_rar/**"]
only-include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "docs/maintainer/pypi.md", "hatch_build.py", "src/bijux_rar"]
exclude = [".gitignore", "/.gitignore", "**/.gitignore"]
