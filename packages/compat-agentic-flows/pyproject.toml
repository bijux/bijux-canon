[build-system]
requires = ["hatchling>=1.27.0,<1.28", "hatch-vcs>=0.4.0,<1.0"]
build-backend = "hatchling.build"

[project]
name = "agentic-flows"
dynamic = ["version", "dependencies"]
description = "Compatibility bridge for the legacy agentic-flows PyPI package. Preserves installs, imports, and the agentic-flows command while installing bijux-canon-runtime from the bijux-canon family at the same version."
readme = "README.md"
requires-python = ">=3.11,<4.0"
license = { text = "Apache-2.0" }
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
maintainers = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
keywords = [
  "bijux",
  "bijux-canon",
  "bijux.io",
  "compatibility",
  "migration",
  "legacy-name",
  "runtime",
  "replay",
  "legacy-command",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Operating System :: MacOS",
  "Operating System :: POSIX",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Topic :: Software Development :: Libraries",
  "Topic :: Utilities",
  "Typing :: Typed",
]

[project.urls]
Homepage = "https://bijux.io/bijux-canon/compat-packages/catalog/agentic-flows/"
Website = "https://bijux.io/"
Documentation = "https://bijux.io/bijux-canon/compat-packages/catalog/agentic-flows/"
MigrationGuide = "https://bijux.io/bijux-canon/compat-packages/migration/migration-guidance/"
LegacyNameMap = "https://bijux.io/bijux-canon/compat-packages/catalog/legacy-name-map/"
Repository = "https://github.com/bijux/bijux-canon"
Issues = "https://github.com/bijux/bijux-canon/issues"
Changelog = "https://github.com/bijux/bijux-canon/blob/main/packages/compat-agentic-flows/CHANGELOG.md"
Security = "https://github.com/bijux/bijux-canon/blob/main/SECURITY.md"
Funding = "https://github.com/sponsors/bijux"

[project.scripts]
agentic-flows = "bijux_canon_runtime.interfaces.cli.entrypoint:main"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.3.4"

[tool.hatch.metadata.hooks.custom]
canonical-name = "bijux-canon-runtime"

[tool.hatch.build]
ignore-vcs = true
include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "docs/maintainer/pypi.md", "hatch_build.py", "src/agentic_flows/**"]
exclude = [".gitignore", "/.gitignore", "**/.gitignore"]
force-include = { "LICENSE" = "LICENSE", "NOTICE" = "NOTICE" }

[tool.hatch.build.targets.wheel]
packages = ["src/agentic_flows"]
include = ["src/agentic_flows/py.typed"]

[tool.hatch.build.targets.wheel.package-data]
"agentic_flows" = ["py.typed"]

[tool.hatch.build.targets.sdist]
include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "docs/maintainer/pypi.md", "hatch_build.py", "src/agentic_flows/**"]
only-include = ["pyproject.toml", "README.md", "CHANGELOG.md", "overview.md", "docs/maintainer/pypi.md", "hatch_build.py", "src/agentic_flows"]
exclude = [".gitignore", "/.gitignore", "**/.gitignore"]
