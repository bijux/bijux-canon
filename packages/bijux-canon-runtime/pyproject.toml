[build-system]
requires = [
  "hatchling>=1.27.0,<1.30",
  "hatch-fancy-pypi-readme>=24.2,<26.0",
  "hatch-vcs>=0.4.0,<1.0",
]
build-backend = "hatchling.build"

[project]
name = "bijux-canon-runtime"
dynamic = ["version"]
description = "Governed runtime execution, replay policy, and auditable non-determinism for the bijux-canon package family from Bijux."
readme = { file = "README.md", content-type = "text/markdown" }
license = { text = "Apache-2.0" }
requires-python = ">=3.11,<4"
authors = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
maintainers = [{ name = "Bijan Mousavi", email = "bijan@bijux.io" }]
keywords = [
  "bijux",
  "bijux-canon",
  "bijux.io",
  "workflow-runtime",
  "execution",
  "reproducibility",
  "replay",
  "audit",
  "non-determinism",
  "governance",
  "agents",
  "contract-first",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Natural Language :: English",
  "Operating System :: OS Independent",
  "Operating System :: MacOS",
  "Operating System :: POSIX",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Typing :: Typed",
  "Topic :: Software Development :: Libraries",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Utilities",
]
dependencies = [
  "bijux-cli>=0.3.4,<0.4.0",
  "bijux-canon-agent>=0.3.4,<0.4.0",
  "bijux-canon-ingest>=0.3.4,<0.4.0",
  "bijux-canon-reason>=0.3.4,<0.4.0",
  "bijux-canon-index>=0.3.4,<0.4.0",
  "duckdb>=1.1.3,<2.0.0",
  "pydantic>=2.0.2,<3.0.0",
]

[project.urls]
Homepage = "https://bijux.io/bijux-canon/bijux-canon-runtime/"
Website = "https://bijux.io/"
Documentation = "https://bijux.io/bijux-canon/bijux-canon-runtime/"
Repository = "https://github.com/bijux/bijux-canon"
Issues = "https://github.com/bijux/bijux-canon/issues"
Changelog = "https://github.com/bijux/bijux-canon/blob/main/packages/bijux-canon-runtime/CHANGELOG.md"
Security = "https://github.com/bijux/bijux-canon/blob/main/SECURITY.md"
Funding = "https://github.com/sponsors/bijux"
PackageMap = "https://bijux.io/bijux-canon/01-bijux-canon/foundation/package-map/"
CompatibilityGuide = "https://bijux.io/bijux-canon/08-compat-packages/migration/migration-guidance/"

[project.optional-dependencies]
api = [
  "fastapi>=0.128,<1.0",
  "starlette>=0.46,<2.0",
  "uvicorn>=0.32,<1.0",
]
dev = [
  "types-PyYAML>=6.0.12,<7.0",
  "PyYAML>=6.0,<7.0",
  "types-orjson>=3.6.0,<4.0",
  "types-colorama>=0.0.14,<1.0",
  "types-psutil>=6.0.0,<8.0",
  "typing-extensions>=4.5.0,<5.0",
  "types-pexpect>=4.9.0,<5.0",
  "pytest>=9.0.3,<10.0",
  "pytest-cov>=6.2.1,<8.0",
  "pytest-asyncio>=1.0.0,<2.0",
  "pytest-timeout>=2.4.0,<3.0",
  "pytest-rerunfailures>=13.0,<17.0",
  "pytest-benchmark>=4.0.0,<6.0",
  "pytest-mock>=3.14.1,<4.0",
  "hypothesis>=6.103.0,<7.0",
  "hypothesis-jsonschema>=0.23.0,<1.0",
  "pexpect>=4.8.0,<5.0",
  "pyfakefs>=5.9.0",
  "httpx>=0.27.0,<1.0",
  "fastapi>=0.128,<1.0",
  "starlette>=0.46,<2.0",
  "ruff>=0.6.8,<1.0",
  "mypy>=1.11.2,<2.0",
  "codespell>=2.3.0,<3.0",
  "pydocstyle>=6.2.1,<7.0",
  "radon>=6.0.0",
  "vulture>=2.7,<3.0",
  "deptry>=0.10.0,<1.0",
  "build>=1.0.3,<2.0",
  "bandit>=1.7.10,<2.0",
  "pip-audit>=2.7.3,<3.0",
  "interrogate>=1.7.0,<2.0",
  "mkdocs>=1.6.1,<2.0",
  "mkdocs-material>=9.5.39,<10.0",
]

[project.scripts]
bijux-canon-runtime = "bijux_canon_runtime.interfaces.cli.entrypoint:main"

[tool.hatch.build]
include = [
  "README.md",
  "CHANGELOG.md",
  "docs/maintainer/pypi.md",
  "src/bijux_canon_runtime/py.typed",
]
force-include = { "LICENSE" = "LICENSE", "NOTICE" = "NOTICE" }

[tool.hatch.version]
source = "vcs"
tag-pattern = "^v(?P<version>.*)$"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }
fallback-version = "0.3.4"

[tool.hatch.build.targets.wheel]
packages = ["src/bijux_canon_runtime"]
zip-safe = false

[tool.hatch.build.targets.wheel.package-data]
"bijux_canon_runtime" = ["py.typed", "api/v1/schema.hash"]

[tool.hatch.build.targets.wheel.shared-data]
"../../apis/06-bijux-canon-runtime/v1/schema.hash" = "bijux_canon_runtime.schema.hash"

[tool.hatch.build.targets.sdist]
include = [
  "README.md",
  "CHANGELOG.md",
  "docs/maintainer/pypi.md",
  "src/bijux_canon_runtime/**",
]

[tool.hatch.metadata.hooks.fancy-pypi-readme]
content-type = "text/markdown"
fragments = [
  { path = "README.md" },
  { path = "CHANGELOG.md" },
]

[tool.interrogate]
fail-under = 100
color = true

[tool.pytest.ini_options]
markers = [
  "e2e: end-to-end runtime contract coverage",
  "regression: regression coverage for replay and determinism guarantees",
  "smoke: focused smoke coverage for storage and package wiring",
  "unit: unit coverage for local runtime components",
]

[tool.bandit]
skips = ["B404", "B311"]
exclude_dirs = [".venv", "tests", "artifacts", ".pytest_cache", ".ruff_cache"]
