site_name: bijux-canon
site_url: https://github.com/bijux/bijux-canon
repo_name: bijux/bijux-canon
repo_url: https://github.com/bijux/bijux-canon

docs_dir: docs

theme:
  name: material
  language: en
  logo: assets/bijux_logo_hq.png
  favicon: assets/bijux_icon.png
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - navigation.footer

nav:
  - Home: index.md
  - Usage: usage.md
  - Tooling: tooling.md
  - Tests: tests.md
  - Governance: governance.md
  - Repository History: repository-history.md
  - Project Tree: project-tree.md
  - Docs Ownership: docs-ownership.md
  - Package Docs:
      - Overview: packages/index.md
      - bijux-canon-agent: packages/bijux-canon-agent/index.md
      - bijux-canon-index: packages/bijux-canon-index/index.md
      - bijux-canon-ingest: packages/bijux-canon-ingest/index.md
      - bijux-canon-reason: packages/bijux-canon-reason/index.md
      - bijux-canon-runtime: packages/bijux-canon-runtime/index.md

plugins:
  - search

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - tables
  - def_list
