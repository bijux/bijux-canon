INHERIT: mkdocs.shared.yml

site_name: Bijux Canon
site_description: Deterministic ingest, retrieval, reasoning, orchestration, and governed runtime documentation for the Bijux Canon package system.
site_author: Bijan Mousavi <bijan@bijux.io>
site_url: !ENV [SITE_URL, https://bijux.io/bijux-canon/]
repo_name: bijux/bijux-canon
repo_url: https://github.com/bijux/bijux-canon
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: artifacts/root/docs/site
watch:
  - docs
  - docs/assets
  - docs/overrides
  - .bijux/shared/bijux-docs
  - mkdocs.yml
  - mkdocs.shared.yml
  - packages/bijux-canon-dev/src/bijux_canon_dev/docs

theme:
  custom_dir: docs/overrides

extra:
  bijux:
    repository: bijux-canon
    docs_package: bijux-canon-dev
    nav_mode: default
    theme_key: bijux:theme
    hub_links:
      - key: bijux
        label: Bijux
        url: https://bijux.io/
      - key: bijux-core
        label: Core
        url: https://bijux.io/bijux-core/
      - key: bijux-canon
        label: Canon
        url: https://bijux.io/bijux-canon/
      - key: bijux-atlas
        label: Atlas
        url: https://bijux.io/bijux-atlas/
      - key: bijux-proteomics
        label: Proteomics
        url: https://bijux.io/bijux-proteomics/
      - key: bijux-pollenomics
        label: Pollenomics
        url: https://bijux.io/bijux-pollenomics/
      - key: bijux-masterclass
        label: Masterclass
        url: https://bijux.io/bijux-masterclass/

