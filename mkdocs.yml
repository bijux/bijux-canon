site_name: bijux-canon
site_url: https://bijux.github.io/bijux-canon/
repo_name: bijux/bijux-canon
repo_url: https://github.com/bijux/bijux-canon
docs_dir: docs
strict: true

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - navigation.footer

nav:
  - Home: index.md
  - Usage: usage.md
  - Tests: tests.md
  - Tooling: tooling.md
  - Governance: governance.md
  - History: repository-history.md
  - Project Tree: project-tree.md

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
