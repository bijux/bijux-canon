site_name: bijux-canon
site_url: https://github.com/bijux/bijux-canon
repo_name: bijux/bijux-canon
repo_url: https://github.com/bijux/bijux-canon

docs_dir: docs

theme:
  name: material
  language: en
  logo: assets/bijux_logo_hq.png
  favicon: assets/bijux_icon.png
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.footer
    - content.code.copy

extra_css:
  - assets/styles/extra.css

nav:
  - Home: index.md
  - bijux-canon:
      - bijux-canon: bijux-canon/index.md
      - Platform Overview: bijux-canon/platform-overview.md
      - Repository Scope: bijux-canon/repository-scope.md
      - Workspace Layout: bijux-canon/workspace-layout.md
      - Package Map: bijux-canon/package-map.md
      - API and Schema Governance: bijux-canon/api-and-schema-governance.md
      - Local Development: bijux-canon/local-development.md
      - Testing and Validation: bijux-canon/testing-and-validation.md
      - Release and Versioning: bijux-canon/release-and-versioning.md
      - Documentation System: bijux-canon/documentation-system.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
